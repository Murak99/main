<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#181a1f">
<title>Englisch-Vokabeltrainer · A1–C2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181a1f; --bg-2:#1f2228;
    --surface:#24272f; --surface-2:#2c303a;
    --stroke:rgba(255,255,255,.09); --stroke-2:rgba(255,255,255,.15);
    --paper:#e7e1d3; --paper-edge:#d3ccb9;
    --ink:#20242e; --ink-soft:#5d6472;
    --text:#eef0f4; --muted:#9aa0ab;
    --amber:#f0a83c; --amber-soft:#f7cd86;
    --teal:#43c2ad; --teal-deep:#2b8f80; --teal-soft:#cfeee7;
    --violet:#8f8cf0; --rust:#e08363;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  /* Basisfarbe auf html: verhindert weiße Ränder beim Overscroll (iOS) */
  html{background:var(--bg)}
  body{
    background:
      radial-gradient(125% 80% at 88% -10%, rgba(139,136,240,.32) 0%, transparent 55%),
      radial-gradient(115% 78% at -8% 106%, rgba(67,194,173,.26) 0%, transparent 55%),
      radial-gradient(95% 70% at 50% 120%, rgba(240,168,60,.12) 0%, transparent 62%),
      linear-gradient(180deg, #1c1e24 0%, var(--bg) 55%);
    background-repeat:no-repeat;
    background-color:var(--bg); /* deckt den gesamten scrollbaren Bereich ab (kein background-attachment:fixed – auf iOS fehlerhaft) */
    color:var(--text);font-family:"Instrument Sans",system-ui,sans-serif;
    min-height:100%;display:flex;flex-direction:column;align-items:center;padding:26px 16px 52px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:620px;display:flex;flex-direction:column;min-height:calc(100vh - 78px)}

  header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}
  .brand .eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:6px}
  .brand h1{font-family:"Fraunces",serif;font-weight:500;font-size:27px;line-height:1.05;letter-spacing:-.01em}
  .brand h1 em{font-style:italic;color:var(--amber-soft)}
  .streak-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--stroke);border-radius:99px;padding:9px 15px;font-weight:600;font-size:14px;flex-shrink:0}
  .streak-pill .fire{font-size:16px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--stroke);border-radius:16px;padding:13px 12px;position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--accent,var(--teal));opacity:.85}
  .kpi .k-val{font-family:"Fraunces",serif;font-weight:600;font-size:22px;line-height:1;color:var(--text)}
  .kpi .k-lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:7px;font-weight:500}
  .kpi .k-sub{font-size:11px;color:var(--muted);margin-top:2px}
  @media (max-width:470px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi .k-val{font-size:20px}}

  .panel{background:var(--surface);border:1px solid var(--stroke);border-radius:16px;padding:13px 15px;margin-bottom:14px}
  .panel .p-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:11px}
  .week{display:flex;gap:8px;align-items:flex-end;height:56px}
  .week .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
  .week .col{width:100%;max-width:26px;background:linear-gradient(180deg,var(--teal),var(--teal-deep));border-radius:6px 6px 3px 3px;min-height:3px;transition:height .4s}
  .week .col.today{background:linear-gradient(180deg,var(--amber-soft),var(--amber))}
  .week .dl{font-size:10px;color:var(--muted)}
  .badges{display:flex;flex-wrap:wrap;gap:8px}
  .badge{display:flex;align-items:center;gap:6px;background:var(--bg-2);border:1px solid var(--stroke);border-radius:99px;padding:6px 12px;font-size:12.5px;font-weight:600}
  .badge.locked{opacity:.4;filter:grayscale(1)}
  .badge .b-i{font-size:14px}

  .ctl-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 8px 3px}
  .rowflex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}

  .users{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .user{font-family:inherit;font-size:13px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--stroke);border-radius:99px;padding:9px 17px;cursor:pointer;transition:.15s}
  .user:hover{border-color:var(--stroke-2)}
  .user.on{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .user-edit{font-family:inherit;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .user-edit:hover{color:var(--amber-soft)}
  .user-input{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--paper);border:none;border-radius:99px;padding:9px 15px;outline:2px solid var(--amber);width:135px}

  .seg{display:inline-flex;gap:5px;background:var(--surface);border:1px solid var(--stroke);border-radius:99px;padding:5px;margin-bottom:16px;flex-wrap:wrap;max-width:100%}
  .seg button{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:transparent;border:none;border-radius:99px;padding:8px 15px;cursor:pointer;transition:.15s}
  .seg button:hover{color:var(--text)}
  .seg button.on{color:#0e1524}
  .seg.lv button.on{background:var(--teal)}
  .seg.md button.on{background:var(--amber)}
  .seg.dir button.on{background:var(--violet);color:#0e1524}
  /* Niveau immer in einer Zeile (bei Bedarf horizontal scrollbar) */
  .seg.lv{display:flex;flex-wrap:nowrap;align-items:center;min-height:44px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .seg.lv::-webkit-scrollbar{display:none}
  .seg.lv button{flex:0 0 auto;padding:8px 13px}

  .cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{font-family:inherit;font-size:12.5px;font-weight:500;background:var(--surface);color:var(--text);border:1px solid var(--stroke);border-radius:99px;padding:8px 14px;cursor:pointer;transition:.16s}
  .chip:hover{border-color:var(--amber);color:var(--amber-soft)}
  .chip.on{background:var(--amber);border-color:var(--amber);color:#221704;font-weight:600}
  .chip.hard{border-color:var(--rust)}
  .chip.hard.on{background:var(--rust);border-color:var(--rust);color:#2a0f06}
  .chip.cats-toggle{border-style:dashed;color:var(--muted);font-weight:600}
  .chip.cats-toggle:hover{border-color:var(--amber);color:var(--amber-soft)}

  .tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .tool{font-family:inherit;font-size:13.5px;font-weight:600;border-radius:12px;padding:11px 16px;cursor:pointer;transition:.15s;border:1px solid var(--stroke);background:var(--surface);color:var(--text)}
  .tool:hover{transform:translateY(-1px);border-color:var(--stroke-2)}
  .tool.primary{background:linear-gradient(180deg,var(--violet),#6d6adf);border:none;color:#0e1524}

  .bar{height:6px;background:var(--surface);border:1px solid var(--stroke);border-radius:99px;overflow:hidden;margin-bottom:22px}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--teal-deep),var(--teal));border-radius:99px;transition:width .5s cubic-bezier(.3,.1,.2,1)}

  /* study area: fills remaining space so the exercise sits centred on screen */
  #main{flex:1 0 auto;display:flex;flex-direction:column;justify-content:center;min-height:44vh}
  .stats{margin-top:26px;padding-top:20px;border-top:1px solid var(--stroke)}

  .stage{perspective:1600px;margin-bottom:18px}
  .card{position:relative;width:100%;min-height:340px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.3,.1,.2,1);cursor:pointer}
  .card.flipped{transform:rotateY(180deg)}
  /* single-face cards (Prüfung, Grammatik) grow with content instead of clipping */
  .card.flat{min-height:0}
  .card.flat .face{position:relative;inset:auto;overflow:visible}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper);color:var(--ink);border-radius:22px;padding:28px 26px;display:flex;flex-direction:column;overflow-y:auto;box-shadow:0 26px 60px -26px rgba(0,0,0,.75), inset 0 0 0 1px var(--paper-edge)}
  .face.back{transform:rotateY(180deg);background:linear-gradient(180deg,#ece6d8 0%,#e1daca 100%)}
  .tagrow{display:flex;gap:8px;align-items:center;margin-bottom:auto;flex-wrap:wrap}
  .tag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--amber);background:rgba(240,168,60,.13);padding:5px 10px;border-radius:7px}
  .lvl-badge{font-size:10.5px;letter-spacing:.08em;font-weight:700;color:#0e5147;background:rgba(67,194,173,.18);padding:5px 9px;border-radius:7px}
  .dir-badge{font-size:10.5px;letter-spacing:.08em;font-weight:700;color:#3a327a;background:rgba(143,140,240,.18);padding:5px 9px;border-radius:7px}
  .prompt{font-family:"Fraunces",serif;font-weight:500;font-size:34px;line-height:1.12;color:var(--ink);margin:18px 0 8px}
  .say{display:inline-flex;align-items:center;gap:8px;margin-top:4px}
  .say-btn{font-family:inherit;font-size:13px;font-weight:600;color:#0e5147;background:rgba(67,194,173,.16);border:1px solid rgba(67,194,173,.4);border-radius:99px;padding:6px 13px;cursor:pointer;transition:.15s}
  .say-btn:hover{background:rgba(67,194,173,.28)}
  .respell{font-size:14px;color:var(--ink-soft)}
  .respell b{color:var(--teal-deep);font-weight:600}
  .hint{font-size:12.5px;color:var(--ink-soft);margin-top:auto;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .hint kbd{font-family:inherit;font-size:11px;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;color:var(--ink);font-weight:600}

  .type-wrap{margin-top:8px}
  .answer-input{width:100%;font-family:"Fraunces",serif;font-size:24px;font-weight:500;color:var(--ink);background:#f0ebde;border:none;border-bottom:2px solid var(--amber);padding:10px 4px;outline:none}
  .answer-input::placeholder{font-family:"Instrument Sans",sans-serif;font-size:16px;font-weight:400;color:var(--ink-soft)}
  .answer-input:focus{border-bottom-color:var(--teal-deep)}
  .type-hint{font-size:12px;color:var(--ink-soft);margin-top:10px}
  .banner{align-self:stretch;font-size:14px;font-weight:600;border-radius:11px;padding:11px 13px;margin-bottom:12px;line-height:1.4;display:flex;align-items:center;gap:8px}
  .banner.ok{background:var(--teal-soft);color:#155a4f}
  .banner.no{background:#f6ddd1;color:#9d4326}
  .banner .typed{font-weight:400;opacity:.85}

  .answer{font-family:"Fraunces",serif;font-weight:600;font-size:33px;line-height:1.1;color:var(--ink);margin:12px 0 6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .answer .say-btn{font-size:14px;padding:7px 14px}
  .respell-back{font-size:14px;color:var(--ink-soft);margin-bottom:12px}
  .respell-back b{color:var(--teal-deep);font-weight:600}
  /* cloze (Lückentext) cards */
  .cloze-de{font-family:"Fraunces",serif;font-weight:500;font-size:23px;line-height:1.24;color:var(--ink);margin:16px 0 12px}
  .cloze-en{font-size:17px;line-height:1.65;color:var(--ink-soft);margin-bottom:13px}
  .cloze-en .blank{display:inline-block;min-width:76px;border-bottom:2px solid var(--amber);margin:0 4px;vertical-align:baseline}
  .cloze-hint{font-size:13px;color:#0e5147;background:rgba(67,194,173,.14);border:1px solid rgba(67,194,173,.3);border-radius:10px;padding:8px 12px;margin-bottom:8px;align-self:flex-start}
  .cloze-hint b{font-weight:700;color:var(--teal-deep)}
  .example .blank-fill{color:var(--teal-deep);font-weight:700}
  /* grammar note + verb-form tables */
  .note.gram{background:#eef4f1;border:1px solid #dbe7e2;color:var(--ink)}
  .note.gram strong{color:var(--teal-deep)}
  .note.syn{background:#eef1fb;border:1px solid #dce0f4;color:var(--ink);line-height:1.5}
  .note.syn strong{color:#4b47b8}
  .vforms{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
  .vforms span{display:flex;flex-direction:column;gap:2px;background:#fff;border:1px solid var(--paper-edge);border-radius:9px;padding:7px 10px;font-size:14px;font-weight:600;color:var(--ink)}
  .vforms span em{font-style:normal;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .vforms span.hl{background:var(--teal-soft);border-color:var(--teal)}
  .vforms span.hl em{color:var(--teal-deep)}
  @media (max-width:420px){.vforms{grid-template-columns:1fr}}
  .example{font-size:15px;line-height:1.5;color:var(--ink);border-left:3px solid var(--teal);padding-left:14px;margin-bottom:14px}
  .example b{color:var(--teal-deep);font-weight:700}
  .note{font-size:13px;line-height:1.5;color:var(--ink-soft);background:#efe8da;border-radius:12px;padding:12px 14px;margin-top:auto}
  .note strong{color:var(--rust)}

  .actions{display:flex;gap:11px}
  .btn{flex:1;font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:14px;padding:15px;cursor:pointer;transition:.15s;letter-spacing:.01em}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.again{background:var(--surface);color:var(--rust);box-shadow:inset 0 0 0 1.5px var(--rust)}
  .btn.again:hover{background:rgba(224,131,99,.14)}
  .btn.know{background:linear-gradient(180deg,var(--teal) 0%,var(--teal-deep) 100%);color:#06201c}
  .btn.reveal{background:linear-gradient(180deg,var(--amber-soft) 0%,var(--amber) 100%);color:#221704}
  .btn.dim{opacity:.45;box-shadow:none}
  .btn.dim:hover{opacity:.7;transform:none}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--stroke)}

  .footline{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:12.5px;color:var(--muted);gap:10px;flex-wrap:wrap}
  .footline .kb kbd{font-family:inherit;font-size:11px;background:var(--surface);border:1px solid var(--stroke);border-radius:6px;padding:2px 7px;color:var(--text);font-weight:600}
  .reset{background:none;border:none;color:var(--muted);font-family:inherit;font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .reset:hover{color:var(--amber-soft)}

  .done{background:linear-gradient(180deg,var(--paper) 0%,#ddd5c3 100%);color:var(--ink);border-radius:22px;padding:40px 28px;text-align:center;box-shadow:0 26px 60px -26px rgba(0,0,0,.7)}
  .done h2{font-family:"Fraunces",serif;font-weight:500;font-size:27px;margin-bottom:10px}
  .done p{color:var(--ink-soft);font-size:15px;line-height:1.55;margin-bottom:20px}
  .score-ring{font-family:"Fraunces",serif;font-size:44px;font-weight:600;margin:6px 0 4px}
  .miss-list{text-align:left;background:#fff;border:1px solid var(--paper-edge);border-radius:14px;padding:14px 16px;margin:8px 0 20px;max-height:230px;overflow:auto}
  .miss-list .m{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #eee5d5;font-size:14px}
  .miss-list .m:last-child{border-bottom:none}
  .miss-list .m .en{font-weight:700;color:var(--teal-deep)}
  .done .btnrow{display:flex;gap:11px;flex-wrap:wrap}
  .done .btnrow .btn{min-width:130px}

  /* modal for add-card */
  .modal-bg{position:fixed;inset:0;background:rgba(6,10,20,.7);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal{background:var(--surface-2);border:1px solid var(--stroke-2);border-radius:20px;padding:24px;width:100%;max-width:440px}
  .modal h3{font-family:"Fraunces",serif;font-weight:500;font-size:22px;margin-bottom:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
  .field input,.field select{width:100%;font-family:inherit;font-size:15px;color:var(--text);background:var(--bg-2);border:1px solid var(--stroke);border-radius:11px;padding:11px 13px;outline:none}
  .field input:focus{border-color:var(--violet)}
  .modal .row2{display:flex;gap:10px}
  .modal .row2 .field{flex:1}
  .modal .m-actions{display:flex;gap:10px;margin-top:8px}
  /* Zeitformen-Referenz */
  .modal.tense-modal{max-width:520px}
  .tense-list{max-height:66vh;overflow-y:auto;display:flex;flex-direction:column;gap:11px;margin:4px -6px 16px;padding:2px 6px}
  .tense{background:var(--bg-2);border:1px solid var(--stroke);border-radius:14px;padding:13px 15px}
  .tense-h{display:flex;flex-direction:column;align-items:flex-start;gap:3px;font-weight:600;font-size:15.5px;color:var(--text);margin-bottom:9px}
  .tense-h span{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);font-weight:600}
  .tense-row{display:flex;gap:8px;font-size:13px;line-height:1.5;margin-top:4px;color:var(--muted)}
  .tense-row b{color:var(--text);font-weight:600;flex-shrink:0;min-width:74px}
  .tense-row .v{color:var(--text)}
  .tense-form code{font-family:"Instrument Sans",sans-serif;color:var(--teal-soft);background:rgba(67,194,173,.12);border-radius:6px;padding:1px 6px}
  .tense-ex{color:var(--text)}
  .tense-ex em{font-style:normal;color:var(--teal-soft);font-weight:600}

  @media (max-width:420px){.prompt{font-size:29px}.answer{font-size:27px}.cloze-de{font-size:20px}.cloze-en{font-size:16px}}
  @media (prefers-reduced-motion:reduce){.card,.bar>span,.week .col,.btn{transition:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="eyebrow">Englisch · A1 → C2</div>
      <h1>Der <em>Vokabel</em>trainer</h1>
    </div>
    <div class="streak-pill"><span class="fire">🔥</span><span id="daysStreak">0</span>&nbsp;<span style="color:var(--muted);font-weight:500">Tage</span></div>
  </header>

  <div class="kpis" id="kpis"></div>

  <p class="ctl-label">Wer lernt?</p>
  <div class="users" id="users"></div>

  <p class="ctl-label">Niveau</p>
  <div class="seg lv" id="levels"></div>

  <p class="ctl-label">Thema</p>
  <div class="cats" id="cats"></div>

  <div class="rowflex">
    <div>
      <p class="ctl-label">Richtung</p>
      <div class="seg dir" id="dir" style="margin-bottom:0">
        <button data-dir="de2en">DE → EN</button>
        <button data-dir="en2de">EN → DE</button>
      </div>
    </div>
    <div>
      <p class="ctl-label">Modus</p>
      <div class="seg md" id="modes" style="margin-bottom:0">
        <button data-mode="type">Eintippen</button>
        <button data-mode="flip">Umdrehen</button>
      </div>
    </div>
  </div>

  <div class="tools">
    <button class="tool primary" id="quizBtn">🎯 Prüfung starten</button>
    <button class="tool" id="gramBtn">🧩 Grammatik-Übung</button>
    <button class="tool" id="tenseBtn">📘 Zeitformen erklärt</button>
    <button class="tool" id="addBtn">＋ Eigene Karte</button>
  </div>

  <div class="bar"><span id="progressFill" style="width:0%"></span></div>
  <div id="main"></div>
  <div class="stats">
    <div class="panel">
      <div class="p-head"><span>Diese Woche</span><span id="weekTotal"></span></div>
      <div class="week" id="week"></div>
    </div>
  </div>

</div>
<div id="modalRoot"></div>

<script>
/* localStorage fallback so the app persists when opened as a normal file */
if(!window.storage){
  window.storage = {
    get:(k)=>Promise.resolve({value: (()=>{ try{ return localStorage.getItem(k); }catch(e){ return null; } })()}),
    set:(k,v)=>Promise.resolve((()=>{ try{ localStorage.setItem(k,v); }catch(e){} })()),
  };
}

const CARDS = [
  // ================= A1 =================

function speak(text){
  try{
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean = text.split("/")[0].replace(/\([^)]*\)/g,"").replace(/[…]/g,"").trim();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = "en-GB"; u.rate = 0.92;
    const v = VOICES.find(v=>/en-GB/i.test(v.lang)) || VOICES.find(v=>/^en/i.test(v.lang));
    if(v) u.voice = v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

  ["n","n"],["p","p"],["q","k"],["r","r"],["s","s"],["t","t"],["v","w"],["w","u"],["x","ks"],["y","i"],["z","s"],
];
const RESPELL_SUFFIX = [["tion","schen"],["sion","schen"],["cious","schös"],["tious","schös"],["ious","iös"],["ture","tscher"],["cian","schen"]];
function tokenizeRespell(w){
  let out="", i=0;
  while(i<w.length){
    const ch=w[i], nx=w[i+1];
    if(ch==="c"){ out += (nx==="e"||nx==="i"||nx==="y") ? "s" : "k"; i++; continue; }
    if(ch==="g" && (nx==="e"||nx==="i"||nx==="y")){ out += "dsch"; i++; continue; }
    let matched=false;
    for(const [pat,rep] of RESPELL_RULES){
      if(w.startsWith(pat,i)){ out+=rep; i+=pat.length; matched=true; break; }
    }
    if(!matched){ out+=ch; i++; }
  }
  return out;
}
function transcribeWord(w){
  let lw = w.toLowerCase().replace(/[^a-z]/g,"");
  if(!lw) return "";
  if(RESPELL_DICT[lw]) return RESPELL_DICT[lw];
  // silent final e (keep for -le, -ee handled separately)
  if(lw.length>2 && lw.endsWith("e") && !/[aeiou]e$/.test(lw) && !lw.endsWith("le")) lw=lw.slice(0,-1);
  for(const [suf,rep] of RESPELL_SUFFIX){
    if(lw.length>suf.length && lw.endsWith(suf)) return tokenizeRespell(lw.slice(0,-suf.length))+rep;
  }
  return tokenizeRespell(lw);
}
function respell(phrase){
  const first = phrase.split("/")[0].replace(/\([^)]*\)/g,"").replace(/…/g,"").trim();
  const words = first.split(/\s+/).filter(Boolean);
  return words.map(transcribeWord).join(" · ");
}

/* ============================================================ MATCHING (forgiving) */
const SPELL_PAIRS = [
  ["colour","color"],["favour","favor"],["behaviour","behavior"],["neighbour","neighbor"],["labour","labor"],
  ["honour","honor"],["flavour","flavor"],["harbour","harbor"],["rumour","rumor"],["centre","center"],
  ["theatre","theater"],["metre","meter"],["litre","liter"],["fibre","fiber"],["organise","organize"],
  ["realise","realize"],["recognise","recognize"],["apologise","apologize"],["prioritise","prioritize"],
  ["analyse","analyze"],["summarise","summarize"],["catalogue","catalog"],["dialogue","dialog"],
  ["travelling","traveling"],["cancelled","canceled"],["labelled","labeled"],["practise","practice"],
  ["licence","license"],["defence","defense"],["offence","offense"],["grey","gray"],["programme","program"],
  ["cheque","check"],["aeroplane","airplane"],["tyre","tire"],["pyjamas","pajamas"],["whilst","while"],
  ["learnt","learned"],["cosy","cozy"],["storey","story"],["sceptical","skeptical"],["jewellery","jewelry"],
  ["enquiry","inquiry"],["cv","resume"],["underground","subway"],["mum","mom"],["holiday","vacation"],
  ["lift","elevator"],["flat","apartment"],
];
const SPELL_MAP = {}; SPELL_PAIRS.forEach(([a,b])=>{ SPELL_MAP[a]=b; SPELL_MAP[b]=a; });
const NOAPOS = {couldnt:"could not",wouldnt:"would not",shouldnt:"should not",dont:"do not",doesnt:"does not",
  didnt:"did not",cant:"can not",cannot:"can not",wont:"will not",isnt:"is not",arent:"are not",wasnt:"was not",
  werent:"were not",im:"i am",ive:"i have",youre:"you are",youve:"you have",lets:"let us",whats:"what is",
  wheres:"where is",theyre:"they are"};

function expandContractions(s){
  return (" " + s.toLowerCase() + " ")
    .replace(/\bi'm\b/g,"i am").replace(/\byou're\b/g,"you are").replace(/\bwe're\b/g,"we are").replace(/\bthey're\b/g,"they are")
    .replace(/\bit's\b/g,"it is").replace(/\bthat's\b/g,"that is").replace(/\bwhat's\b/g,"what is").replace(/\bwhere's\b/g,"where is")
    .replace(/\bhere's\b/g,"here is").replace(/\bhow's\b/g,"how is")
    .replace(/\bdon't\b/g,"do not").replace(/\bdoesn't\b/g,"does not").replace(/\bdidn't\b/g,"did not")
    .replace(/\bcan't\b/g,"cannot").replace(/\bcannot\b/g,"can not").replace(/\bwon't\b/g,"will not")
    .replace(/\bisn't\b/g,"is not").replace(/\baren't\b/g,"are not").replace(/\bwouldn't\b/g,"would not")
    .replace(/\bcouldn't\b/g,"could not").replace(/\bshouldn't\b/g,"should not")
    .replace(/\blet's\b/g,"let us")
    .replace(/\bi'd\b/g,"i would").replace(/\bi'll\b/g,"i will").replace(/\bi've\b/g,"i have")
    .replace(/\byou'd\b/g,"you would").replace(/\byou'll\b/g,"you will").replace(/\byou've\b/g,"you have")
    .replace(/\bwe'll\b/g,"we will").replace(/\bwe'd\b/g,"we would")
    .replace(/\s+/g," ").trim();
}
function expandNoApos(s){ return s.split(" ").map(w=> NOAPOS[w] || w).join(" "); }
function stripAll(s){
  return expandContractions(s || "").normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/[.,!?;:"'’`´…()]/g,"").replace(/[-–—]/g," ").replace(/\s+/g," ").trim();
}
function spellingSwaps(form){
  const out = new Set([form]);
  const words = form.split(" ");
  if(words.some(w=>SPELL_MAP[w])) out.add(words.map(w=> SPELL_MAP[w] || w).join(" "));
  const extra = new Set();
  out.forEach(f=>{
    extra.add(f.replace(/ise\b/g,"ize")); extra.add(f.replace(/ize\b/g,"ise"));
    extra.add(f.replace(/isation\b/g,"ization")); extra.add(f.replace(/ization\b/g,"isation"));
    if(!f.includes(" ")){ if(f.endsWith("s") && f.length>3) extra.add(f.slice(0,-1)); else extra.add(f+"s"); }
  });
  extra.forEach(x=> x && out.add(x));
  return out;
}
function coreForms(str){
  const out = new Set();
  const base = stripAll(str);
  const seeds = new Set([base, expandNoApos(base)]);
  seeds.add(base.replace(/^(to|the|a|an)\s+/,""));
  seeds.add(base.replace(/\b(sb|sth|somebody|something|someone|one's|ones|oneself|yourself|you|your|me|us|them|him|her|it|one)\b/g," ").replace(/\s+/g," ").trim());
  const s2 = new Set(); seeds.forEach(s=>{ if(s){ s2.add(s); s2.add(expandNoApos(s)); } });
  s2.forEach(s=>{ if(s) spellingSwaps(s).forEach(v=> v && out.add(v)); });
  out.delete(""); return out;
}
function acceptedSetEN(c){
  const set = new Set();
  c.en.split("/").map(x=>x.trim()).filter(Boolean).forEach(alt=>{
    coreForms(alt.replace(/[()]/g,"")).forEach(v=>set.add(v));
    coreForms(alt.replace(/\([^)]*\)/g," ")).forEach(v=>set.add(v));
  });
  return set;
}
// German side matching
function deVariants(s){
  let x = s.replace(/\([^)]*\)/g," ").toLowerCase().replace(/[.,!?;:"'’`…]/g,"").replace(/[-–—]/g," ").replace(/\s+/g," ").trim();
  const forms = new Set([x, x.replace(/^(der|die|das|den|dem|des|ein|eine|einen|einem|einer|eines|zu|sich|im|in)\s+/,"")]);
  const out = new Set();
  forms.forEach(f=>{ if(!f) return; out.add(f); out.add(f.replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")); });
  out.delete(""); return out;
}
function coreFormsDE(str){
  const out = new Set();
  str.split("/").map(x=>x.trim()).filter(Boolean).forEach(alt=> deVariants(alt).forEach(v=>out.add(v)));
  return out;
}
function isCorrect(card, input){
  if(!input || !input.trim()) return false;
  if(card.cloze){ // Lückentext: immer das englische Zielwort prüfen
    const cand = coreForms(input); const set = acceptedSetEN(card);
    for(const x of cand){ if(set.has(x)) return true; } return false;
  }
  if(direction==="en2de"){
    const cand = coreFormsDE(input); const set = coreFormsDE(card.de);
    for(const x of cand){ if(set.has(x)) return true; } return false;
  }
  const cand = coreForms(input); const set = acceptedSetEN(card);
  for(const x of cand){ if(set.has(x)) return true; } return false;
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

const IRREGULAR = {
  // base: [Simple Past, Past Participle]
  be:["was/were","been"], become:["became","become"], begin:["began","begun"], break:["broke","broken"],
  bring:["brought","brought"], build:["built","built"], buy:["bought","bought"], catch:["caught","caught"],
  choose:["chose","chosen"], come:["came","come"], cost:["cost","cost"], cut:["cut","cut"], do:["did","done"],
  draw:["drew","drawn"], drink:["drank","drunk"], drive:["drove","driven"], eat:["ate","eaten"], fall:["fell","fallen"],
  feel:["felt","felt"], find:["found","found"], fly:["flew","flown"], forget:["forgot","forgotten"], get:["got","got/gotten"],
  give:["gave","given"], go:["went","gone"], grow:["grew","grown"], have:["had","had"], hear:["heard","heard"],
  hold:["held","held"], keep:["kept","kept"], know:["knew","known"], leave:["left","left"], lose:["lost","lost"],
  make:["made","made"], mean:["meant","meant"], meet:["met","met"], pay:["paid","paid"], put:["put","put"],
  read:["read","read"], ride:["rode","ridden"], ring:["rang","rung"], run:["ran","run"], say:["said","said"],
  see:["saw","seen"], sell:["sold","sold"], send:["sent","sent"], show:["showed","shown"], sing:["sang","sung"],
  sit:["sat","sat"], sleep:["slept","slept"], speak:["spoke","spoken"], spend:["spent","spent"], stand:["stood","stood"],
  steal:["stole","stolen"], swim:["swam","swum"], take:["took","taken"], teach:["taught","taught"], tell:["told","told"],
  think:["thought","thought"], throw:["threw","thrown"], understand:["understood","understood"], wake:["woke","woken"],
  wear:["wore","worn"], win:["won","won"], write:["wrote","written"], hit:["hit","hit"], let:["let","let"],
  set:["set","set"], hurt:["hurt","hurt"], lead:["led","led"], bite:["bit","bitten"], hide:["hid","hidden"],
  shoot:["shot","shot"], sink:["sank","sunk"],
};
const DOUBLE_FINAL = new Set(["stop","plan","run","sit","get","swim","begin","put","win","shop","drop","cut","hit","let","set","chat","jog","clap","rob","tap","ban","grab","permit","refer","prefer","occur"]);
const THIRD_IRREGULAR = {have:"has", be:"is", do:"does", go:"goes"};
function thirdPerson(v){
  if(THIRD_IRREGULAR[v]) return THIRD_IRREGULAR[v];
  if(/(s|ss|sh|ch|x|z|o)$/.test(v)) return v+"es";
  if(/[^aeiou]y$/.test(v)) return v.slice(0,-1)+"ies";
  return v+"s";
}
function ingForm(v){
  if(v==="be") return "being";
  if(v.endsWith("ie")) return v.slice(0,-2)+"ying";
  if(/(ee|oe|ye)$/.test(v)) return v+"ing";
  if(v.endsWith("e")) return v.slice(0,-1)+"ing";
  if(DOUBLE_FINAL.has(v)) return v+v.slice(-1)+"ing";
  return v+"ing";
}
function regularPast(v){
  if(v.endsWith("e")) return v+"d";
  if(/[^aeiou]y$/.test(v)) return v.slice(0,-1)+"ied";
  if(DOUBLE_FINAL.has(v)) return v+v.slice(-1)+"ed";
  return v+"ed";
}
function verbForms(v){
  const ir=IRREGULAR[v];
  return {base:v, past: ir?ir[0]:regularPast(v), pp: ir?ir[1]:regularPast(v), ing:ingForm(v), third:thirdPerson(v), reg:!ir};
}
// Grammatik-/Verwendungserklärung, ersetzt den früheren Platzhaltertext
function baseVerb(en){ return (en||"").split("/")[0].replace(/^to\s+/i,"").trim().toLowerCase().replace(/[^a-z]/g,""); }
function grammarNote(c){
  const enFirst=(c.en||"").split("/")[0].trim();
  const de=(c.de||"");
  // Verb (kompakt, damit die Kartenrückseite nicht zu hoch wird)
  if(/^to\s+/i.test(c.en)){
    const v=baseVerb(c.en); const f=verbForms(v);
    const kind=f.reg?"regelmäßig (‑ed)":"unregelmäßig";
    return `<div class="note gram" style="margin-top:14px"><strong>🔧 Verb</strong> · ${kind}<br>
      <b>to ${v}</b> – <b>${f.past}</b> – <b>${f.pp}</b> · 3. P.: ${f.third} · ‑ing: ${f.ing}
      <span style="opacity:.7"> · mehr unter 🧩 Grammatik</span></div>`;
  }
  // Substantiv (mit Artikel im Deutschen)
  const art=de.match(/^\s*(der|die|das)\b/i);
  if(art){
    const g={der:"maskulin",die:"feminin",das:"neutrum"}[art[1].toLowerCase()];
    const uncount=/unz(ä|ae)hlbar/i.test(c.note||"")||/unz(ä|ae)hlbar/i.test(de);
    return `<div class="note gram" style="margin-top:14px"><strong>📦 Substantiv</strong> · dt. <b>${art[1].toLowerCase()}</b> (${g}).
      Im Englischen kein Genus – Artikel ist immer <b>the</b>/<b>a</b>. ${uncount?"Unzählbar – kein Plural, kein „a“.":"Plural meist mit <b>‑s</b>."}</div>`;
  }
  // Adverb
  if(/ly$/i.test(enFirst) && !/\s/.test(enFirst)){
    return `<div class="note gram" style="margin-top:14px"><strong>⚡ Adverb</strong> · beschreibt ein Verb/Adjektiv (oft auf <b>‑ly</b>): „She works <b>${enFirst}</b>.“ Steht meist nach dem Verb oder am Satzanfang.</div>`;
  }
  // Redewendung / Mehrwortausdruck
  if(/\s/.test(enFirst)){
    return `<div class="note gram" style="margin-top:14px"><strong>💬 Feste Wendung</strong> · als Ganzes lernen, nicht Wort für Wort übersetzen: „<b>${enFirst}</b>“.</div>`;
  }
  // sonst: Adjektiv
  return `<div class="note gram" style="margin-top:14px"><strong>🏷 Adjektiv</strong> · steht vor dem Substantiv („a <b>${enFirst}</b> …“) oder nach <em>to be</em> („it is <b>${enFirst}</b>“). Steigerung: <b>‑er/‑est</b> oder <b>more/most</b>.</div>`;
}

function synKey(en){ return (en||"").split("/")[0].replace(/\([^)]*\)/g,"").replace(/^(to|the|a|an)\s+/i,"").trim().toLowerCase().replace(/[^a-z\- ]/g,"").trim(); }
function synonymsHTML(en){
  const s=SYNONYMS[synKey(en)];
  return s ? `<div class="note syn" style="margin-top:14px">🔁 <strong>Synonyme:</strong> ${s}</div>` : "";
}
// Rückseiten-Tipp: Synonyme bevorzugt, sonst automatische Erklärung
function backTip(c){
  const s=synonymsHTML(c.en);
  if(s) return s;
  if(c.note) return "";        // kuratierter Hinweis wird schon separat gezeigt
  return grammarNote(c);
}

function promptSide(c){ return direction==="en2de" ? c.en : c.de; }
function answerSide(c){ return direction==="en2de" ? c.de : c.en; }

function sayBlock(text, big){
  return `<span class="say"><button class="say-btn" data-say="${text.replace(/"/g,'&quot;')}">🔊 Anhören</button></span>`;
}
/* ---- Cloze (Lückentext) helpers: ganze Sätze, nur ein Wort wird ausgefüllt ---- */
function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function clozeBlank(c){
  const re = new RegExp("\\b"+escapeRegExp(c.en)+"\\b","i");
  if(!re.test(c.sentence)) return c.sentence + ' <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>';
  return c.sentence.replace(re, '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
}
function clozeReveal(c){
  const re = new RegExp("\\b"+escapeRegExp(c.en)+"\\b","i");
  if(!re.test(c.sentence)) return c.sentence;
  return c.sentence.replace(re, m=>`<span class="blank-fill">${m}</span>`);
}
function clozePromptHTML(c){
  return `<div class="cloze-de">${c.de}</div>
    <div class="cloze-en">${clozeBlank(c)}</div>
    ${c.hint?`<div class="cloze-hint">Gesuchtes Wort: <b>${c.hint}</b></div>`:""}`;
}

function render(){
  loadVoices();
  renderKPIs(); renderWeek(); renderUsers(); renderLevels(); renderCats(); renderDir(); renderModes(); renderProgress();
  const main=document.getElementById("main");
  if(gram){ renderGram(); return; }
  if(quiz){ renderQuiz(); return; }

  const total=activeIndices().length;
  if(total===0){
    main.innerHTML=`<div class="done"><h2>Keine Karten hier</h2><p>Für diese Auswahl gibt es keine Vokabeln. Wähle ein anderes Thema, Niveau oder „Alle“.</p></div>`;
    return;
  }
  if(pos>=queue.length){
    const m=masteredCount();
    main.innerHTML=`<div class="done"><h2>Runde geschafft ✦</h2>
      <p>${m} von ${total} Karten sitzen sicher. ${m<total?"Noch eine Runde für den Rest?":"Alles gemeistert — stark!"}</p>
      <button class="btn reveal" id="restart">Nächste Runde <span style="opacity:.6">· Leertaste</span></button></div>`;
    document.getElementById("restart").onclick=()=>{ buildQueue(); render(); };
    return;
  }

  const c=allCards()[queue[pos]];
  const isCloze = !!c.cloze;
  const engProm = isCloze ? false : direction==="en2de";   // English is the prompt
  const banner=(mode==="type"&&checked)
    ? (lastCorrect?`<div class="banner ok">✓ Richtig!</div>`
        :`<div class="banner no">✗ Nicht ganz.${lastTyped?` <span class="typed">Du: „${lastTyped}“</span>`:` <span class="typed">(keine Eingabe)</span>`}</div>`):"";
  const dirBadge = isCloze ? "" : `<span class="dir-badge">${direction==="en2de"?"EN → DE":"DE → EN"}</span>`;
  const tagLabel = isCloze ? "✍︎ Lückentext" : (CAT_LABELS[c.cat]||c.cat);
  const tagrow=`<div class="tagrow"><span class="lvl-badge">${c.lvl}</span><span class="tag">${tagLabel}</span>${dirBadge}</div>`;

  const promptBlock = isCloze
    ? clozePromptHTML(c)
    : `<div class="prompt">${promptSide(c)}</div>${engProm ? `<div style="margin:2px 0 6px">${sayBlock(c.en)}</div>` : ""}`;
  const inPlace = isCloze ? "Fehlendes Wort eintippen…" : (direction==="en2de"?"Deutsche":"Englische")+" Antwort eintippen…";
  const front=(mode==="type"&&!checked)
    ? `<div class="face front">${tagrow}${promptBlock}
        <div class="type-wrap">
          <input id="answerInput" class="answer-input" placeholder="${inPlace}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
          <div class="type-hint"><kbd style="font-family:inherit;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;font-weight:600">Enter</kbd> zum Prüfen · leer = „Weiß ich nicht“</div>
        </div></div>`
    : `<div class="face front">${tagrow}${promptBlock}
        <div class="hint"><kbd>Leertaste</kbd> Antwort zeigen · <kbd>P</kbd> anhören</div></div>`;

  const engAns = isCloze ? true : !engProm;  // English is the answer side
  const backTag = isCloze ? "Lösung" : (direction==="en2de"?"Deutsch":"Englisch");
  const answerText = isCloze ? c.en : answerSide(c);
  const exampleHTML = isCloze ? clozeReveal(c) : (c.ex||"");
  main.innerHTML=`
    <div class="stage"><div class="card ${flipped?"flipped":""}" id="card">
      ${front}
      <div class="face back">
        ${banner}
        <div class="tagrow"><span class="tag">${backTag}</span></div>
        <div class="answer">${answerText} ${engAns?`<button class="say-btn" data-say="${c.en.replace(/"/g,'&quot;')}">🔊</button>`:""}</div>
        ${engAns?pronLine(c.en):""}
        <div class="example">${exampleHTML}</div>
        ${isCloze
          ? `${synonymsHTML(c.en)||grammarNote(c)}<div class="note" style="opacity:.6;margin-top:8px">🇩🇪 ${c.de}</div>`
          : `${c.note?`<div class="note">${c.note}</div>`:""}${backTip(c)}`}
      </div>
    </div></div>
    <div class="actions" id="actions"></div>
    <div class="footline">
      <span class="count">Karte ${pos+1} / ${queue.length}</span>
      <span class="kb"><kbd>Leertaste</kbd> weiter · <kbd>1</kbd> nochmal · <kbd>2</kbd> kann ich · <kbd>P</kbd> Ton</span>
      <button class="reset" id="reset">zurücksetzen</button>
    </div>`;

  document.getElementById("card").onclick=()=>{ if(mode==="type"&&!checked)return; if(!flipped) doFlip(); };
  document.getElementById("reset").onclick=resetAll;
  const inp=document.getElementById("answerInput");
  if(inp){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();submitAnswer();} }); }
  bindSay();
  renderActions();
}
function bindSay(){ document.querySelectorAll(".say-btn").forEach(b=>{ b.onclick=(e)=>{ e.stopPropagation(); speak(b.dataset.say); }; }); }

function submitAnswer(){
  const c=allCards()[queue[pos]]; const inp=document.getElementById("answerInput");
  lastTyped=inp?inp.value.trim():""; lastCorrect=isCorrect(c,lastTyped); checked=true; flipped=true; render();
}
function renderActions(){
  const a=document.getElementById("actions"); if(!a)return;
  if(!flipped){
    if(mode==="type"&&!checked){ a.innerHTML=`<button class="btn reveal" id="revealBtn">Prüfen</button>`; document.getElementById("revealBtn").onclick=submitAnswer; }
    else{ a.innerHTML=`<button class="btn reveal" id="revealBtn">Antwort zeigen</button>`; document.getElementById("revealBtn").onclick=doFlip; }
  }else{
    const ad=(mode==="type"&&checked&&lastCorrect)?" dim":""; const kd=(mode==="type"&&checked&&!lastCorrect)?" dim":"";
    a.innerHTML=`<button class="btn again${ad}" id="againBtn">Nochmal</button><button class="btn know${kd}" id="knowBtn">Kann ich</button>`;
    document.getElementById("againBtn").onclick=()=>rate(false); document.getElementById("knowBtn").onclick=()=>rate(true);
  }
}
function doFlip(){ flipped=!flipped; const card=document.getElementById("card"); if(card)card.classList.toggle("flipped",flipped); renderActions(); }
async function rate(known){
  const i=queue[pos], k=keyOf(i), box=ensureBox(k); box.seen++;
  if(known){ box.b=Math.min(3,box.b+1); stats.correct++; stats.streak++; if(stats.streak>stats.best)stats.best=stats.streak; }
  else{ box.b=1; box.wrong++; stats.streak=0; queue.push(i); }
  stats.reviewed++; registerActivity();
  await saveBoxes(); await saveStats();
  pos++; flipped=false; checked=false; lastTyped=""; render();
}
async function resetAll(){ activeIndices().forEach(i=>{ boxes[keyOf(i)]={b:1,wrong:0,seen:0}; }); await saveBoxes(); buildQueue(); render(); }

function startQuiz(){
  const pool=activeIndices(); if(!pool.length) return;
  const size=Math.min(12,pool.length);
  gram=null;
  quiz={ items:shuffle(pool).slice(0,size), i:0, wrong:[], checked:false, correct:0, typed:"", dir:direction };
  render();
}

    const n=quiz.items.length, sc=Math.round(quiz.correct/n*100);

  }
  const c=allCards()[quiz.items[quiz.i]];

    <div class="stage"><div class="card flat" id="card"><div class="face front">
      <div class="tagrow"><span class="lvl-badge">${c.lvl}</span><span class="tag">🎯 Prüfung</span>${dirBadge}</div>

        <input id="quizInput" class="answer-input" placeholder="${placeholder}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" ${quiz.checked?"disabled":""}>

  const inp=document.getElementById("quizInput");
  if(inp && !quiz.checked){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();quizCheck();} }); }
  const cb=document.getElementById("qCheck"); if(cb) cb.onclick=quizCheck;
  const nb=document.getElementById("qNext"); if(nb) nb.onclick=quizNext;
  document.getElementById("qAbort").onclick=()=>{ quiz=null; buildQueue(); render(); };
  bindSay();
}
async function quizCheck(){
  const idx=quiz.items[quiz.i]; const c=allCards()[idx]; const inp=document.getElementById("quizInput");
  quiz.typed=inp?inp.value.trim():""; quiz.lastOK=isCorrectDir(c,quiz.typed,quiz.dir); quiz.checked=true;
  const box=ensureBox(keyOf(idx)); box.seen++;
  if(quiz.lastOK){ quiz.correct++; box.b=Math.min(3,box.b+1); stats.correct++; stats.streak++; if(stats.streak>stats.best)stats.best=stats.streak; }
  else{ box.b=1; box.wrong++; stats.streak=0; quiz.wrong.push(c.cloze?{idx, prompt:c.de, answer:c.en}:{idx, prompt:(quiz.dir==="en2de"?c.en:c.de), answer:(quiz.dir==="en2de"?c.de:c.en)}); }
  stats.reviewed++; registerActivity();
  await saveBoxes(); await saveStats();
  render();
}
function quizNext(){ quiz.i++; quiz.checked=false; quiz.typed=""; render(); }

/* ============================================================ GRAMMATIK-TRAINER (Zeitformen) */
const GRAMMAR_VERBS = [
  {v:"go",de:"gehen"},{v:"make",de:"machen"},{v:"take",de:"nehmen"},{v:"see",de:"sehen"},
  {v:"come",de:"kommen"},{v:"give",de:"geben"},{v:"find",de:"finden"},{v:"think",de:"denken"},
  {v:"buy",de:"kaufen"},{v:"bring",de:"bringen"},{v:"speak",de:"sprechen"},{v:"write",de:"schreiben"},
  {v:"read",de:"lesen"},{v:"drive",de:"fahren"},{v:"eat",de:"essen"},{v:"drink",de:"trinken"},
  {v:"run",de:"rennen"},{v:"swim",de:"schwimmen"},{v:"sing",de:"singen"},{v:"sleep",de:"schlafen"},
  {v:"leave",de:"verlassen"},{v:"meet",de:"treffen"},{v:"pay",de:"bezahlen"},{v:"send",de:"senden"},
  {v:"lose",de:"verlieren"},{v:"win",de:"gewinnen"},{v:"teach",de:"unterrichten"},{v:"understand",de:"verstehen"},
  {v:"begin",de:"beginnen"},{v:"forget",de:"vergessen"},{v:"choose",de:"wählen"},{v:"catch",de:"fangen"},
  {v:"work",de:"arbeiten"},{v:"play",de:"spielen"},{v:"study",de:"lernen / studieren"},{v:"try",de:"versuchen"},
  {v:"stop",de:"anhalten / aufhören"},{v:"plan",de:"planen"},{v:"use",de:"benutzen"},{v:"like",de:"mögen"},
  {v:"live",de:"leben / wohnen"},{v:"watch",de:"anschauen"},{v:"carry",de:"tragen"},{v:"decide",de:"entscheiden"},
];
const GRAM_FORMS = [
  {key:"past",  q:"Simple Past",                  tip:"Abgeschlossene Vergangenheit: <b>Yesterday I ___ .</b>"},
  {key:"pp",    q:"Past Participle (3. Form)",     tip:"Nach have/has/had & im Passiv: <b>I have ___ .</b>"},
  {key:"ing",   q:"‑ing-Form (Verlaufsform)",     tip:"Gerade jetzt: <b>I am ___ .</b>"},
  {key:"third", q:"3. Person Singular (he/she/it)",tip:"Präsens mit he/she/it: <b>She ___ every day.</b>"},
];
let gram=null; // {items:[{gv,form,answer,forms}], i, checked, correct, wrong:[], typed, lastOK}
function gramNorm(s){ return (s||"").toLowerCase().replace(/[.,!?;:"'’]/g,"").replace(/\s+/g," ").trim(); }
function gramMatch(answer, input){ const cand=gramNorm(input); return answer.split("/").map(gramNorm).includes(cand); }
function startGram(){
  quiz=null;
  const pool=shuffle(GRAMMAR_VERBS.map((_,i)=>i));
  const N=Math.min(12,pool.length); const items=[];
  for(let n=0;n<N;n++){
    const gv=GRAMMAR_VERBS[pool[n]]; const f=verbForms(gv.v);
    const form=GRAM_FORMS[Math.floor(Math.random()*GRAM_FORMS.length)];
    items.push({gv, form, answer:f[form.key], forms:f});
  }
  gram={items, i:0, checked:false, correct:0, wrong:[], typed:"", lastOK:false};
  render();
}
function verbTable(f, highlight){
  const row=(lbl,val,key)=>`<span class="${highlight===key?"hl":""}"><em>${lbl}</em>${val}</span>`;
  return `<div class="vforms">
    ${row("Infinitiv","to "+f.base)}
    ${row("3. Person",f.third,"third")}
    ${row("Simple Past",f.past,"past")}
    ${row("Past Participle",f.pp,"pp")}
    ${row("‑ing-Form",f.ing,"ing")}</div>`;
}
function renderGram(){
  const main=document.getElementById("main");
  if(gram.i>=gram.items.length){
    const n=gram.items.length, sc=Math.round(gram.correct/n*100);
    const missHTML = gram.wrong.length ? `<div class="miss-list">${gram.wrong.map(w=>`<div class="m"><span>to ${w.base} · ${w.q}</span><span class="en">${w.answer}</span></div>`).join("")}</div>` : `<p>Perfekt — alle Formen richtig! 🎉</p>`;
    main.innerHTML=`<div class="done">
      <div class="k-lbl" style="color:var(--ink-soft);letter-spacing:.1em">Grammatik-Ergebnis</div>
      <div class="score-ring" style="color:${sc>=80?'var(--teal-deep)':sc>=50?'var(--amber)':'var(--rust)'}">${sc}%</div>
      <p>${gram.correct} von ${n} richtig.</p>
      ${missHTML}
      <div class="btnrow">
        ${gram.wrong.length?`<button class="btn again" id="gRetry">Fehler üben (${gram.wrong.length})</button>`:""}
        <button class="btn reveal" id="gNew">Neue Runde</button>
        <button class="btn ghost" id="gEnd">Beenden</button>
      </div></div>`;
    document.getElementById("gNew").onclick=()=>startGram();
    document.getElementById("gEnd").onclick=()=>{ gram=null; buildQueue(); render(); };
    const rt=document.getElementById("gRetry");
    if(rt) rt.onclick=()=>{ const items=gram.wrong.map(w=>({gv:{v:w.base,de:w.de}, form:{key:w.key,q:w.q,tip:w.tip}, answer:w.answer, forms:w.forms})); gram={items, i:0, checked:false, correct:0, wrong:[], typed:"", lastOK:false}; render(); };
    return;
  }
  const it=gram.items[gram.i]; const f=it.forms;
  const banner = gram.checked ? (gram.lastOK?`<div class="banner ok">✓ Richtig!</div>`:`<div class="banner no">✗ Richtig: <b style="margin-left:4px">${it.answer}</b>${gram.typed?` <span class="typed">· du: „${gram.typed}“</span>`:""}</div>`) : "";
  main.innerHTML=`
    <div class="stage"><div class="card flat" id="card"><div class="face front">
      <div class="tagrow"><span class="tag">🧩 Grammatik</span><span class="dir-badge">Zeitformen</span></div>
      ${banner}
      <div class="prompt">to ${it.gv.v} <span style="color:var(--ink-soft);font-size:.62em">→ ${it.form.q}</span></div>
      <div class="cloze-hint">Bedeutung: <b>${it.gv.de}</b> · ${it.form.tip}</div>
      <div class="type-wrap">
        <input id="gramInput" class="answer-input" placeholder="Form eintippen…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" ${gram.checked?"disabled":""}>
        <div class="type-hint">${gram.checked?"<kbd style='font-family:inherit;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;font-weight:600'>Leertaste</kbd> weiter":"<kbd style='font-family:inherit;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;font-weight:600'>Enter</kbd> prüfen"}</div>
      </div>
      ${gram.checked?`<div class="note gram" style="margin-top:14px"><strong>${f.reg?"Regelmäßig (‑ed)":"Unregelmäßig"}</strong> · alle Formen von <b>to ${f.base}</b>:${verbTable(f, it.form.key)}</div>`:""}
    </div></div></div>
    <div class="actions">${gram.checked?`<button class="btn reveal" id="gNext">Weiter</button>`:`<button class="btn reveal" id="gCheck">Prüfen</button>`}</div>
    <div class="footline"><span class="count">Frage ${gram.i+1} / ${gram.items.length}</span><span class="kb">richtig: ${gram.correct}</span><button class="reset" id="gAbort">abbrechen</button></div>`;
  const inp=document.getElementById("gramInput");
  if(inp && !gram.checked){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();gramCheck();} }); }
  const cb=document.getElementById("gCheck"); if(cb) cb.onclick=gramCheck;
  const nb=document.getElementById("gNext"); if(nb) nb.onclick=gramNext;
  document.getElementById("gAbort").onclick=()=>{ gram=null; buildQueue(); render(); };
}
async function gramCheck(){
  const it=gram.items[gram.i]; const inp=document.getElementById("gramInput");
  gram.typed=inp?inp.value.trim():""; gram.lastOK=gramMatch(it.answer, gram.typed); gram.checked=true;
  if(gram.lastOK){ gram.correct++; stats.correct++; stats.streak++; if(stats.streak>stats.best)stats.best=stats.streak; }
  else{ stats.streak=0; gram.wrong.push({base:it.gv.v, de:it.gv.de, q:it.form.q, key:it.form.key, tip:it.form.tip, answer:it.answer, forms:it.forms}); }
  stats.reviewed++; registerActivity();
  await saveStats();
  render();
}
function gramNext(){ gram.i++; gram.checked=false; gram.typed=""; render(); }

/* ============================================================ ADD OWN CARD */
function openAddCard(){
  const cats=Object.keys(CAT_LABELS).filter(k=>k!=="all"&&k!=="difficult");
  const lvls=["A1","A2","B1","B2","C1","C2"];
  document.getElementById("modalRoot").innerHTML=`
    <div class="modal-bg" id="modalBg"><div class="modal">
      <h3>Eigene Karte hinzufügen</h3>
      <div class="field"><label>Deutsch</label><input id="fDe" placeholder="z.B. die Besprechung"></div>
      <div class="field"><label>Englisch</label><input id="fEn" placeholder="z.B. the meeting  (Alternativen mit / trennen)"></div>
      <div class="field"><label>Beispielsatz (optional, Englisch)</label><input id="fEx" placeholder="We have a meeting at 3."></div>
      <div class="row2">
        <div class="field"><label>Niveau</label><select id="fLvl">${lvls.map(l=>`<option ${l===levelFilter?"selected":""}>${l}</option>`).join("")}</select></div>
        <div class="field"><label>Thema</label><select id="fCat">${cats.map(k=>`<option value="${k}" ${k==="custom"?"selected":""}>${CAT_LABELS[k]}</option>`).join("")}</select></div>
      </div>
      <div class="m-actions"><button class="btn ghost" id="mCancel">Abbrechen</button><button class="btn reveal" id="mSave">Speichern</button></div>
    </div></div>`;
  document.getElementById("modalBg").onclick=(e)=>{ if(e.target.id==="modalBg") closeModal(); };
  document.getElementById("mCancel").onclick=closeModal;
  document.getElementById("mSave").onclick=saveNewCard;
  document.getElementById("fDe").focus();
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }

/* ============================================================ ZEITFORMEN-REFERENZ */
const TENSES = [
  {name:"Present Simple", de:"Einfache Gegenwart",
   form:"Grundform (he/she/it&nbsp;+&nbsp;<code>-s</code>)",
   use:"Fakten, Gewohnheiten, Regelmäßiges.",
   sig:"always, usually, every day, often, never",
   ex:"She <em>works</em> in Berlin.", exde:"Sie arbeitet in Berlin."},
  {name:"Present Continuous", de:"Verlaufsform Gegenwart",
   form:"<code>am/is/are</code> + Verb<code>-ing</code>",
   use:"Was gerade jetzt oder vorübergehend passiert.",
   sig:"now, at the moment, right now, currently",
   ex:"She <em>is working</em> right now.", exde:"Sie arbeitet gerade."},
  {name:"Present Perfect", de:"vollendete Gegenwart",
   form:"<code>have/has</code> + Past Participle (3.&nbsp;Form)",
   use:"Vergangenes mit Bezug zur Gegenwart; Erfahrungen; Ergebnis zählt, nicht der Zeitpunkt.",
   sig:"already, yet, ever, never, just, since, for",
   ex:"I <em>have finished</em> the report.", exde:"Ich habe den Bericht fertig."},
  {name:"Present Perfect Continuous", de:"Verlaufsform vollendete Gegenwart",
   form:"<code>have/has been</code> + Verb<code>-ing</code>",
   use:"Handlung, die in der Vergangenheit begann und noch andauert (Dauer betont).",
   sig:"for, since, how long, all day",
   ex:"I <em>have been working</em> since 8 a.m.", exde:"Ich arbeite seit 8 Uhr."},
  {name:"Past Simple", de:"einfache Vergangenheit",
   form:"Verb<code>-ed</code> / unregelmäßige 2.&nbsp;Form",
   use:"Abgeschlossene Handlung mit bekanntem Zeitpunkt in der Vergangenheit.",
   sig:"yesterday, last week, in 2019, ago, then",
   ex:"She <em>worked</em> late yesterday.", exde:"Sie arbeitete gestern lange."},
  {name:"Past Continuous", de:"Verlaufsform Vergangenheit",
   form:"<code>was/were</code> + Verb<code>-ing</code>",
   use:"Länger andauernde Handlung in der Vergangenheit, oft unterbrochen.",
   sig:"while, as, when, at 5 o'clock",
   ex:"I <em>was working</em> when he called.", exde:"Ich arbeitete, als er anrief."},
  {name:"Past Perfect", de:"Vorvergangenheit",
   form:"<code>had</code> + Past Participle (3.&nbsp;Form)",
   use:"Das, was <em>vor</em> einem anderen Ereignis in der Vergangenheit passierte.",
   sig:"already, before, after, by the time, once",
   ex:"She <em>had left</em> before I arrived.", exde:"Sie war gegangen, bevor ich ankam."},
  {name:"Future — will", de:"Zukunft (Vorhersage/Entschluss)",
   form:"<code>will</code> + Grundform",
   use:"Spontane Entscheidungen, Vorhersagen, Versprechen.",
   sig:"tomorrow, next week, soon, I think, probably",
   ex:"I <em>will call</em> you later.", exde:"Ich rufe dich später an."},
  {name:"Future — going to", de:"Zukunft (Absicht/Plan)",
   form:"<code>am/is/are going to</code> + Grundform",
   use:"Geplante Absichten und Anzeichen für die Zukunft.",
   sig:"tonight, this weekend, planned",
   ex:"We <em>are going to</em> move house.", exde:"Wir werden umziehen."},
  {name:"Conditional — would", de:"Konditional / würde-Form",
   form:"<code>would</code> + Grundform",
   use:"Hypothetisches, höfliche Bitten, if-Sätze (Typ 2).",
   sig:"if, I would, in that case",
   ex:"I <em>would help</em> if I could.", exde:"Ich würde helfen, wenn ich könnte."},
];
function openTenses(){
  const rows=TENSES.map(t=>`
    <div class="tense">
      <div class="tense-h">${t.name} <span>${t.de}</span></div>
      <div class="tense-row tense-form"><b>Bildung</b><span class="v">${t.form}</span></div>
      <div class="tense-row"><b>Verwendung</b><span class="v">${t.use}</span></div>
      <div class="tense-row"><b>Signalwörter</b><span class="v">${t.sig}</span></div>
      <div class="tense-row tense-ex"><b>Beispiel</b><span class="v">${t.ex} <span style="opacity:.6">→ ${t.exde}</span></span></div>
    </div>`).join("");
  document.getElementById("modalRoot").innerHTML=`
    <div class="modal-bg" id="modalBg"><div class="modal tense-modal">
      <h3>📘 Englische Zeitformen</h3>
      <div class="tense-list">${rows}</div>
      <div class="m-actions"><button class="btn reveal" id="tClose">Schließen</button></div>
    </div></div>`;
  document.getElementById("modalBg").onclick=(e)=>{ if(e.target.id==="modalBg") closeModal(); };
  document.getElementById("tClose").onclick=closeModal;
}
async function saveNewCard(){
  const de=document.getElementById("fDe").value.trim();
  const en=document.getElementById("fEn").value.trim();
  const ex=document.getElementById("fEx").value.trim();
  const lvl=document.getElementById("fLvl").value;
  const cat=document.getElementById("fCat").value;
  if(!de||!en){ alert("Bitte Deutsch und Englisch ausfüllen."); return; }
  customCards.push({lvl,cat,de,en,ex: ex||"",note:"",custom:true});
  await saveCustom(); closeModal();
  levelFilter=lvl; filter=cat; buildQueue(); render();
}

/* ============================================================ KEYBOARD (space = weiter) */
document.addEventListener("keydown", e=>{
  const tag=e.target&&e.target.tagName;
  if(tag==="INPUT"||tag==="TEXTAREA") return;
  if(document.getElementById("modalBg")){ if(e.key==="Escape") closeModal(); return; }
  // grammar-trainer keys
  if(gram){
    if(e.code==="Space"){ e.preventDefault(); if(gram.i<gram.items.length && gram.checked) gramNext(); }
    else if(e.key==="Enter" && gram.checked) gramNext();
    return;
  }
  // quiz keys
  if(quiz){
    if(e.code==="Space"){ e.preventDefault(); if(quiz.i>=quiz.items.length){ return; } if(quiz.checked) quizNext(); }
    else if(e.key==="Enter" && quiz.checked) quizNext();
    else if((e.key==="p"||e.key==="P")){ const c=allCards()[quiz.items[quiz.i]]; if(c) speak(c.en); }
    return;
  }
  if(e.key==="p"||e.key==="P"){ const c=allCards()[queue[pos]]; if(c) speak(c.en); return; }
  if(e.code==="Space"){
    e.preventDefault();
    const restart=document.getElementById("restart"); if(restart){ restart.click(); return; }
    if(flipped) advance(); else if(mode!=="type") doFlip();
  }
  else if(e.key==="Enter"&&flipped) advance();
  else if(flipped&&e.key==="1") rate(false);
  else if(flipped&&e.key==="2") rate(true);
});
function advance(){ if(mode==="type"&&checked) rate(lastCorrect); else rate(true); }

document.getElementById("quizBtn").onclick=startQuiz;
document.getElementById("gramBtn").onclick=startGram;
document.getElementById("tenseBtn").onclick=openTenses;
document.getElementById("addBtn").onclick=openAddCard;

(async function init(){ await loadProfiles(); await loadProfileData(); buildQueue(); render(); })();
</script>
