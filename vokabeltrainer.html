<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e1524">
<title>Englisch-Vokabeltrainer · A1–C2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1524; --bg-2:#141d31;
    --surface:#1a2438; --surface-2:#212d45;
    --stroke:rgba(255,255,255,.09); --stroke-2:rgba(255,255,255,.14);
    --paper:#f7f3ea; --paper-edge:#e7dfcf;
    --ink:#20242e; --ink-soft:#5d6472;
    --text:#eaf0f7; --muted:#93a0b5;
    --amber:#f0a83c; --amber-soft:#f7cd86;
    --teal:#43c2ad; --teal-deep:#2b8f80; --teal-soft:#cfeee7;
    --violet:#8f8cf0; --rust:#e08363;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(130% 80% at 88% -8%, #21335c 0%, transparent 52%),
      radial-gradient(110% 70% at -5% 108%, #163a44 0%, transparent 55%),
      var(--bg);
    color:var(--text);font-family:"Instrument Sans",system-ui,sans-serif;
    min-height:100%;display:flex;flex-direction:column;align-items:center;padding:26px 16px 52px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:620px;display:flex;flex-direction:column;min-height:calc(100vh - 78px)}

  header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}
  .brand .eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:6px}
  .brand h1{font-family:"Fraunces",serif;font-weight:500;font-size:27px;line-height:1.05;letter-spacing:-.01em}
  .brand h1 em{font-style:italic;color:var(--amber-soft)}
  .streak-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--stroke);border-radius:99px;padding:9px 15px;font-weight:600;font-size:14px;flex-shrink:0}
  .streak-pill .fire{font-size:16px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--stroke);border-radius:16px;padding:13px 12px;position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--accent,var(--teal));opacity:.85}
  .kpi .k-val{font-family:"Fraunces",serif;font-weight:600;font-size:22px;line-height:1;color:var(--text)}
  .kpi .k-lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:7px;font-weight:500}
  .kpi .k-sub{font-size:11px;color:var(--muted);margin-top:2px}
  @media (max-width:470px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi .k-val{font-size:20px}}

  .panel{background:var(--surface);border:1px solid var(--stroke);border-radius:16px;padding:13px 15px;margin-bottom:14px}
  .panel .p-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:11px}
  .week{display:flex;gap:8px;align-items:flex-end;height:56px}
  .week .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
  .week .col{width:100%;max-width:26px;background:linear-gradient(180deg,var(--teal),var(--teal-deep));border-radius:6px 6px 3px 3px;min-height:3px;transition:height .4s}
  .week .col.today{background:linear-gradient(180deg,var(--amber-soft),var(--amber))}
  .week .dl{font-size:10px;color:var(--muted)}
  .badges{display:flex;flex-wrap:wrap;gap:8px}
  .badge{display:flex;align-items:center;gap:6px;background:var(--bg-2);border:1px solid var(--stroke);border-radius:99px;padding:6px 12px;font-size:12.5px;font-weight:600}
  .badge.locked{opacity:.4;filter:grayscale(1)}
  .badge .b-i{font-size:14px}

  .ctl-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 8px 3px}
  .rowflex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}

  .users{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .user{font-family:inherit;font-size:13px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--stroke);border-radius:99px;padding:9px 17px;cursor:pointer;transition:.15s}
  .user:hover{border-color:var(--stroke-2)}
  .user.on{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .user-edit{font-family:inherit;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .user-edit:hover{color:var(--amber-soft)}
  .user-input{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--paper);border:none;border-radius:99px;padding:9px 15px;outline:2px solid var(--amber);width:135px}

  .seg{display:inline-flex;gap:5px;background:var(--surface);border:1px solid var(--stroke);border-radius:99px;padding:5px;margin-bottom:16px;flex-wrap:wrap;max-width:100%}
  .seg button{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:transparent;border:none;border-radius:99px;padding:8px 15px;cursor:pointer;transition:.15s}
  .seg button:hover{color:var(--text)}
  .seg button.on{color:#0e1524}
  .seg.lv button.on{background:var(--teal)}
  .seg.md button.on{background:var(--amber)}
  .seg.dir button.on{background:var(--violet);color:#0e1524}

  .cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{font-family:inherit;font-size:12.5px;font-weight:500;background:var(--surface);color:var(--text);border:1px solid var(--stroke);border-radius:99px;padding:8px 14px;cursor:pointer;transition:.16s}
  .chip:hover{border-color:var(--amber);color:var(--amber-soft)}
  .chip.on{background:var(--amber);border-color:var(--amber);color:#221704;font-weight:600}
  .chip.hard{border-color:var(--rust)}
  .chip.hard.on{background:var(--rust);border-color:var(--rust);color:#2a0f06}

  .tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .tool{font-family:inherit;font-size:13.5px;font-weight:600;border-radius:12px;padding:11px 16px;cursor:pointer;transition:.15s;border:1px solid var(--stroke);background:var(--surface);color:var(--text)}
  .tool:hover{transform:translateY(-1px);border-color:var(--stroke-2)}
  .tool.primary{background:linear-gradient(180deg,var(--violet),#6d6adf);border:none;color:#0e1524}

  .bar{height:6px;background:var(--surface);border:1px solid var(--stroke);border-radius:99px;overflow:hidden;margin-bottom:22px}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--teal-deep),var(--teal));border-radius:99px;transition:width .5s cubic-bezier(.3,.1,.2,1)}

  /* study area: fills remaining space so the exercise sits centred on screen */
  #main{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:44vh}
  .stats{margin-top:26px;padding-top:20px;border-top:1px solid var(--stroke)}

  .stage{perspective:1600px;margin-bottom:18px}
  .card{position:relative;width:100%;min-height:340px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.3,.1,.2,1);cursor:pointer}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper);color:var(--ink);border-radius:22px;padding:28px 26px;display:flex;flex-direction:column;box-shadow:0 26px 60px -26px rgba(0,0,0,.75), inset 0 0 0 1px var(--paper-edge)}
  .face.back{transform:rotateY(180deg);background:linear-gradient(180deg,#fbf8f1 0%,#f2ece0 100%)}
  .tagrow{display:flex;gap:8px;align-items:center;margin-bottom:auto;flex-wrap:wrap}
  .tag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--amber);background:rgba(240,168,60,.13);padding:5px 10px;border-radius:7px}
  .lvl-badge{font-size:10.5px;letter-spacing:.08em;font-weight:700;color:#0e5147;background:rgba(67,194,173,.18);padding:5px 9px;border-radius:7px}
  .dir-badge{font-size:10.5px;letter-spacing:.08em;font-weight:700;color:#3a327a;background:rgba(143,140,240,.18);padding:5px 9px;border-radius:7px}
  .prompt{font-family:"Fraunces",serif;font-weight:500;font-size:34px;line-height:1.12;color:var(--ink);margin:18px 0 8px}
  .say{display:inline-flex;align-items:center;gap:8px;margin-top:4px}
  .say-btn{font-family:inherit;font-size:13px;font-weight:600;color:#0e5147;background:rgba(67,194,173,.16);border:1px solid rgba(67,194,173,.4);border-radius:99px;padding:6px 13px;cursor:pointer;transition:.15s}
  .say-btn:hover{background:rgba(67,194,173,.28)}
  .respell{font-size:14px;color:var(--ink-soft)}
  .respell b{color:var(--teal-deep);font-weight:600}
  .hint{font-size:12.5px;color:var(--ink-soft);margin-top:auto;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .hint kbd{font-family:inherit;font-size:11px;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;color:var(--ink);font-weight:600}

  .type-wrap{margin-top:8px}
  .answer-input{width:100%;font-family:"Fraunces",serif;font-size:24px;font-weight:500;color:var(--ink);background:#fffdf8;border:none;border-bottom:2px solid var(--amber);padding:10px 4px;outline:none}
  .answer-input::placeholder{font-family:"Instrument Sans",sans-serif;font-size:16px;font-weight:400;color:var(--ink-soft)}
  .answer-input:focus{border-bottom-color:var(--teal-deep)}
  .type-hint{font-size:12px;color:var(--ink-soft);margin-top:10px}
  .banner{align-self:stretch;font-size:14px;font-weight:600;border-radius:11px;padding:11px 13px;margin-bottom:12px;line-height:1.4;display:flex;align-items:center;gap:8px}
  .banner.ok{background:var(--teal-soft);color:#155a4f}
  .banner.no{background:#f6ddd1;color:#9d4326}
  .banner .typed{font-weight:400;opacity:.85}

  .answer{font-family:"Fraunces",serif;font-weight:600;font-size:33px;line-height:1.1;color:var(--ink);margin:12px 0 6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .answer .say-btn{font-size:14px;padding:7px 14px}
  .respell-back{font-size:14px;color:var(--ink-soft);margin-bottom:12px}
  .respell-back b{color:var(--teal-deep);font-weight:600}
  .example{font-size:15px;line-height:1.5;color:var(--ink);border-left:3px solid var(--teal);padding-left:14px;margin-bottom:14px}
  .example b{color:var(--teal-deep);font-weight:700}
  .note{font-size:13px;line-height:1.5;color:var(--ink-soft);background:#efe8da;border-radius:12px;padding:12px 14px;margin-top:auto}
  .note strong{color:var(--rust)}

  .actions{display:flex;gap:11px}
  .btn{flex:1;font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:14px;padding:15px;cursor:pointer;transition:.15s;letter-spacing:.01em}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.again{background:var(--surface);color:var(--rust);box-shadow:inset 0 0 0 1.5px var(--rust)}
  .btn.again:hover{background:rgba(224,131,99,.14)}
  .btn.know{background:linear-gradient(180deg,var(--teal) 0%,var(--teal-deep) 100%);color:#06201c}
  .btn.reveal{background:linear-gradient(180deg,var(--amber-soft) 0%,var(--amber) 100%);color:#221704}
  .btn.dim{opacity:.45;box-shadow:none}
  .btn.dim:hover{opacity:.7;transform:none}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--stroke)}

  .footline{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:12.5px;color:var(--muted);gap:10px;flex-wrap:wrap}
  .footline .kb kbd{font-family:inherit;font-size:11px;background:var(--surface);border:1px solid var(--stroke);border-radius:6px;padding:2px 7px;color:var(--text);font-weight:600}
  .reset{background:none;border:none;color:var(--muted);font-family:inherit;font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .reset:hover{color:var(--amber-soft)}

  .done{background:linear-gradient(180deg,var(--paper) 0%,#efe8da 100%);color:var(--ink);border-radius:22px;padding:40px 28px;text-align:center;box-shadow:0 26px 60px -26px rgba(0,0,0,.7)}
  .done h2{font-family:"Fraunces",serif;font-weight:500;font-size:27px;margin-bottom:10px}
  .done p{color:var(--ink-soft);font-size:15px;line-height:1.55;margin-bottom:20px}
  .score-ring{font-family:"Fraunces",serif;font-size:44px;font-weight:600;margin:6px 0 4px}
  .miss-list{text-align:left;background:#fff;border:1px solid var(--paper-edge);border-radius:14px;padding:14px 16px;margin:8px 0 20px;max-height:230px;overflow:auto}
  .miss-list .m{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #eee5d5;font-size:14px}
  .miss-list .m:last-child{border-bottom:none}
  .miss-list .m .en{font-weight:700;color:var(--teal-deep)}
  .done .btnrow{display:flex;gap:11px;flex-wrap:wrap}
  .done .btnrow .btn{min-width:130px}

  /* modal for add-card */
  .modal-bg{position:fixed;inset:0;background:rgba(6,10,20,.7);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal{background:var(--surface-2);border:1px solid var(--stroke-2);border-radius:20px;padding:24px;width:100%;max-width:440px}
  .modal h3{font-family:"Fraunces",serif;font-weight:500;font-size:22px;margin-bottom:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
  .field input,.field select{width:100%;font-family:inherit;font-size:15px;color:var(--text);background:var(--bg-2);border:1px solid var(--stroke);border-radius:11px;padding:11px 13px;outline:none}
  .field input:focus{border-color:var(--violet)}
  .modal .row2{display:flex;gap:10px}
  .modal .row2 .field{flex:1}
  .modal .m-actions{display:flex;gap:10px;margin-top:8px}

  @media (max-width:420px){.prompt{font-size:29px}.answer{font-size:27px}}
  @media (prefers-reduced-motion:reduce){.card,.bar>span,.week .col,.btn{transition:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="eyebrow">Englisch · A1 → C2</div>
      <h1>Der <em>Vokabel</em>trainer</h1>
    </div>
    <div class="streak-pill"><span class="fire">🔥</span><span id="daysStreak">0</span>&nbsp;<span style="color:var(--muted);font-weight:500">Tage</span></div>
  </header>

  <div class="kpis" id="kpis"></div>

  <p class="ctl-label">Wer lernt?</p>
  <div class="users" id="users"></div>

  <p class="ctl-label">Niveau</p>
  <div class="seg lv" id="levels"></div>

  <p class="ctl-label">Thema</p>
  <div class="cats" id="cats"></div>

  <div class="rowflex">
    <div>
      <p class="ctl-label">Richtung</p>
      <div class="seg dir" id="dir" style="margin-bottom:0">
        <button data-dir="de2en">DE → EN</button>
        <button data-dir="en2de">EN → DE</button>
      </div>
    </div>
    <div>
      <p class="ctl-label">Modus</p>
      <div class="seg md" id="modes" style="margin-bottom:0">
        <button data-mode="type">Eintippen</button>
        <button data-mode="flip">Umdrehen</button>
      </div>
    </div>
  </div>

  <div class="tools">
    <button class="tool primary" id="quizBtn">🎯 Prüfung starten</button>
    <button class="tool" id="addBtn">＋ Eigene Karte</button>
  </div>

  <div class="bar"><span id="progressFill" style="width:0%"></span></div>

  <div id="main"></div>

  <div class="stats">
    <div class="panel">
      <div class="p-head"><span>Diese Woche</span><span id="weekTotal"></span></div>
      <div class="week" id="week"></div>
    </div>

    <div class="panel">
      <div class="p-head"><span>Abzeichen</span><span id="badgeCount"></span></div>
      <div class="badges" id="badges"></div>
    </div>
  </div>
</div>
<div id="modalRoot"></div>

<script>
/* localStorage fallback so the app persists when opened as a normal file */
if(!window.storage){
  window.storage = {
    get:(k)=>Promise.resolve({value: (()=>{ try{ return localStorage.getItem(k); }catch(e){ return null; } })()}),
    set:(k,v)=>Promise.resolve((()=>{ try{ localStorage.setItem(k,v); }catch(e){} })()),
  };
}

const CARDS = [
  // ================= A1 =================
  {lvl:"A1",cat:"smalltalk",de:"Hallo / Guten Tag",en:"Hello / Hi",ex:"<b>Hello!</b> Nice to meet you."},
  {lvl:"A1",cat:"smalltalk",de:"Guten Morgen",en:"Good morning",ex:"<b>Good morning!</b>"},
  {lvl:"A1",cat:"smalltalk",de:"Danke",en:"Thank you / Thanks",ex:"<b>Thank you</b> very much."},
  {lvl:"A1",cat:"smalltalk",de:"Bitte (= gern geschehen)",en:"You're welcome",ex:"„Thanks!“ — „<b>You're welcome.</b>“",note:"<strong>Achtung:</strong> „please“ = bitte nur beim Bitten."},
  {lvl:"A1",cat:"smalltalk",de:"Ja / Nein",en:"Yes / No",ex:"<b>Yes</b>, please."},
  {lvl:"A1",cat:"smalltalk",de:"Wie heißt du?",en:"What's your name?",ex:"Hi, <b>what's your name?</b>"},
  {lvl:"A1",cat:"smalltalk",de:"Ich heiße…",en:"My name is…",ex:"<b>My name is</b> Anna."},
  {lvl:"A1",cat:"smalltalk",de:"Tschüss",en:"Bye / Goodbye",ex:"See you! <b>Bye!</b>"},
  {lvl:"A1",cat:"food",de:"das Wasser",en:"water",ex:"A glass of <b>water</b>, please."},
  {lvl:"A1",cat:"food",de:"das Brot",en:"bread",ex:"I'd like some <b>bread</b>."},
  {lvl:"A1",cat:"food",de:"der Kaffee",en:"coffee",ex:"A <b>coffee</b>, please."},
  {lvl:"A1",cat:"food",de:"essen",en:"to eat",ex:"Let's <b>eat</b>!"},
  {lvl:"A1",cat:"food",de:"trinken",en:"to drink",ex:"What do you want to <b>drink</b>?"},
  {lvl:"A1",cat:"travel",de:"der Zug",en:"the train",ex:"The <b>train</b> is here."},
  {lvl:"A1",cat:"travel",de:"das Auto",en:"the car",ex:"We go by <b>car</b>."},
  {lvl:"A1",cat:"travel",de:"der Flughafen",en:"the airport",ex:"We are at the <b>airport</b>."},
  {lvl:"A1",cat:"travel",de:"das Ticket / die Fahrkarte",en:"the ticket",ex:"One <b>ticket</b>, please."},
  {lvl:"A1",cat:"home",de:"das Haus",en:"the house",ex:"This is my <b>house</b>."},
  {lvl:"A1",cat:"home",de:"das Zimmer",en:"the room",ex:"My <b>room</b> is small."},
  {lvl:"A1",cat:"home",de:"die Familie",en:"the family",ex:"I love my <b>family</b>."},
  {lvl:"A1",cat:"home",de:"der Freund / die Freundin",en:"the friend",ex:"She is my <b>friend</b>."},
  {lvl:"A1",cat:"directions",de:"links / rechts",en:"left / right",ex:"Turn <b>left</b>, then <b>right</b>."},
  {lvl:"A1",cat:"directions",de:"hier / dort",en:"here / there",ex:"It's <b>here</b>, not <b>there</b>."},
  {lvl:"A1",cat:"time",de:"heute",en:"today",ex:"We leave <b>today</b>."},
  {lvl:"A1",cat:"time",de:"morgen",en:"tomorrow",ex:"See you <b>tomorrow</b>!",note:"<strong>Nicht:</strong> „morning“ = der Morgen."},
  {lvl:"A1",cat:"time",de:"Wie spät ist es?",en:"What time is it?",ex:"Excuse me, <b>what time is it?</b>"},
  {lvl:"A1",cat:"shopping",de:"kaufen",en:"to buy",ex:"I want to <b>buy</b> this."},
  {lvl:"A1",cat:"shopping",de:"das Geld",en:"money",ex:"I have no <b>money</b>."},
  {lvl:"A1",cat:"health",de:"der Arzt / die Ärztin",en:"the doctor",ex:"I need a <b>doctor</b>."},
  {lvl:"A1",cat:"health",de:"Hilfe!",en:"Help!",ex:"<b>Help!</b>"},
  {lvl:"A1",cat:"feelings",de:"gut / schlecht",en:"good / bad",ex:"The food is <b>good</b>."},
  {lvl:"A1",cat:"feelings",de:"glücklich",en:"happy",ex:"I'm so <b>happy</b>!"},

  // ================= A2 =================
  {lvl:"A2",cat:"smalltalk",de:"Woher kommst du?",en:"Where are you from?",ex:"<b>Where are you from?</b> — Germany."},
  {lvl:"A2",cat:"smalltalk",de:"Wie geht es dir?",en:"How are you?",ex:"Hi! <b>How are you?</b>",note:"Antwort: „I'm fine, thanks. And you?“"},

function speak(text){
  try{
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean = text.split("/")[0].replace(/\([^)]*\)/g,"").replace(/[…]/g,"").trim();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = "en-GB"; u.rate = 0.92;
    const v = VOICES.find(v=>/en-GB/i.test(v.lang)) || VOICES.find(v=>/^en/i.test(v.lang));

    window.speechSynthesis.speak(u);
  }catch(e){}
}

function ipaFallbackWord(w){
  // very rough grapheme->IPA (approximate; marked with ≈)
  let s=w.toLowerCase().replace(/[^a-z]/g,"");
  if(!s) return "";
  const rules=[["tion","ʃən"],["sion","ʒən"],["ture","tʃə"],["igh","aɪ"],["ough","ʌf"],["augh","ɔː"],
    ["ee","iː"],["ea","iː"],["oo","uː"],["ou","aʊ"],["ow","aʊ"],["oa","əʊ"],["ai","eɪ"],["ay","eɪ"],
    ["ey","eɪ"],["oy","ɔɪ"],["oi","ɔɪ"],["au","ɔː"],["aw","ɔː"],["ck","k"],["ch","tʃ"],["sh","ʃ"],
    ["th","θ"],["ph","f"],["qu","kw"],["ng","ŋ"],["er","ə"],["or","ɔː"],["ar","ɑː"],["ir","ɜː"],["ur","ɜː"],
    ["a","æ"],["e","e"],["i","ɪ"],["o","ɒ"],["u","ʌ"],["c","k"],["g","ɡ"],["j","dʒ"],["y","i"],["x","ks"]];
  let out="",i=0;
  while(i<s.length){ let m=false; for(const[p,r]of rules){ if(s.startsWith(p,i)){ out+=r; i+=p.length; m=true; break; } } if(!m){ out+=s[i]; i++; } }
  return out;
}
function ipaFor(en){
  const primary=(en||"").split("/")[0].replace(/\([^)]*\)/g,"").replace(/^(to|the|a|an)\s+/i,"")
    .replace(/[.,!?;:…"'’]/g,"").trim().toLowerCase();
  if(!primary) return null;
  const tokens=primary.split(/\s+/);
  const parts=[]; let approx=false;
  for(const tok of tokens){
    if(IPA_DICT[tok]){ parts.push(IPA_DICT[tok]); continue; }
    // single word (incl. hyphen) fallback
    if(tokens.length===1){ parts.push(ipaFallbackWord(tok)); approx=true; }
    else { return null; } // phrase with an unknown word -> use audio/respell instead
  }
  const text=parts.join(" ").trim();
  return text ? {text, approx} : null;
}
function pronLine(en){

  if(ip) return `<div class="respell-back">IPA <b>${ip.approx?"≈ ":""}/${ip.text}/</b> <span style="opacity:.5">· 🔊 für Audio</span></div>`;
  return `<div class="respell-back">🗣 <b>${respell(en)}</b> <span style="opacity:.55">· vereinfacht · 🔊 für Audio</span></div>`;
}

const RESPELL_RULES = [

  ["tch","tsch"],["sch","sch"],["sh","sch"],["ch","tsch"],["ph","f"],["th","th"],["wh","u"],

];
const RESPELL_SUFFIX = [["tion","schen"],["sion","schen"],["cious","schös"],["tious","schös"],["ious","iös"],["ture","tscher"],["cian","schen"]];
function tokenizeRespell(w){
  let out="", i=0;
  while(i<w.length){
    const ch=w[i], nx=w[i+1];
    if(ch==="c"){ out += (nx==="e"||nx==="i"||nx==="y") ? "s" : "k"; i++; continue; }
    if(ch==="g" && (nx==="e"||nx==="i"||nx==="y")){ out += "dsch"; i++; continue; }
    let matched=false;
    for(const [pat,rep] of RESPELL_RULES){
      if(w.startsWith(pat,i)){ out+=rep; i+=pat.length; matched=true; break; }
    }
    if(!matched){ out+=ch; i++; }
  }
  return out;
}
function transcribeWord(w){
  let lw = w.toLowerCase().replace(/[^a-z]/g,"");
  if(!lw) return "";
  if(RESPELL_DICT[lw]) return RESPELL_DICT[lw];
  // silent final e (keep for -le, -ee handled separately)
  if(lw.length>2 && lw.endsWith("e") && !/[aeiou]e$/.test(lw) && !lw.endsWith("le")) lw=lw.slice(0,-1);
  for(const [suf,rep] of RESPELL_SUFFIX){
    if(lw.length>suf.length && lw.endsWith(suf)) return tokenizeRespell(lw.slice(0,-suf.length))+rep;
  }
  return tokenizeRespell(lw);
}
function respell(phrase){
  const first = phrase.split("/")[0].replace(/\([^)]*\)/g,"").replace(/…/g,"").trim();
  const words = first.split(/\s+/).filter(Boolean);
  return words.map(transcribeWord).join(" · ");
}

const SPELL_MAP = {}; SPELL_PAIRS.forEach(([a,b])=>{ SPELL_MAP[a]=b; SPELL_MAP[b]=a; });
const NOAPOS = {couldnt:"could not",wouldnt:"would not",shouldnt:"should not",dont:"do not",doesnt:"does not",
  didnt:"did not",cant:"can not",cannot:"can not",wont:"will not",isnt:"is not",arent:"are not",wasnt:"was not",

function expandContractions(s){
  return (" " + s.toLowerCase() + " ")
    .replace(/\bi'm\b/g,"i am").replace(/\byou're\b/g,"you are").replace(/\bwe're\b/g,"we are").replace(/\bthey're\b/g,"they are")
    .replace(/\bit's\b/g,"it is").replace(/\bthat's\b/g,"that is").replace(/\bwhat's\b/g,"what is").replace(/\bwhere's\b/g,"where is")
    .replace(/\bhere's\b/g,"here is").replace(/\bhow's\b/g,"how is")
    .replace(/\bdon't\b/g,"do not").replace(/\bdoesn't\b/g,"does not").replace(/\bdidn't\b/g,"did not")
    .replace(/\bcan't\b/g,"cannot").replace(/\bcannot\b/g,"can not").replace(/\bwon't\b/g,"will not")
    .replace(/\bisn't\b/g,"is not").replace(/\baren't\b/g,"are not").replace(/\bwouldn't\b/g,"would not")
    .replace(/\bcouldn't\b/g,"could not").replace(/\bshouldn't\b/g,"should not")
    .replace(/\blet's\b/g,"let us")
    .replace(/\bi'd\b/g,"i would").replace(/\bi'll\b/g,"i will").replace(/\bi've\b/g,"i have")
    .replace(/\byou'd\b/g,"you would").replace(/\byou'll\b/g,"you will").replace(/\byou've\b/g,"you have")
    .replace(/\bwe'll\b/g,"we will").replace(/\bwe'd\b/g,"we would")
    .replace(/\s+/g," ").trim();
}
function expandNoApos(s){ return s.split(" ").map(w=> NOAPOS[w] || w).join(" "); }
function stripAll(s){
  return expandContractions(s || "").normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/[.,!?;:"'’`´…()]/g,"").replace(/[-–—]/g," ").replace(/\s+/g," ").trim();
}
function spellingSwaps(form){
  const out = new Set([form]);
  const words = form.split(" ");
  if(words.some(w=>SPELL_MAP[w])) out.add(words.map(w=> SPELL_MAP[w] || w).join(" "));
  const extra = new Set();
  out.forEach(f=>{
    extra.add(f.replace(/ise\b/g,"ize")); extra.add(f.replace(/ize\b/g,"ise"));
    extra.add(f.replace(/isation\b/g,"ization")); extra.add(f.replace(/ization\b/g,"isation"));
    if(!f.includes(" ")){ if(f.endsWith("s") && f.length>3) extra.add(f.slice(0,-1)); else extra.add(f+"s"); }
  });
  extra.forEach(x=> x && out.add(x));
  return out;
}
function coreForms(str){
  const out = new Set();
  const base = stripAll(str);
  const seeds = new Set([base, expandNoApos(base)]);
  seeds.add(base.replace(/^(to|the|a|an)\s+/,""));
  seeds.add(base.replace(/\b(sb|sth|somebody|something|someone|one's|ones|oneself|yourself|you|your|me|us|them|him|her|it|one)\b/g," ").replace(/\s+/g," ").trim());
  const s2 = new Set(); seeds.forEach(s=>{ if(s){ s2.add(s); s2.add(expandNoApos(s)); } });
  s2.forEach(s=>{ if(s) spellingSwaps(s).forEach(v=> v && out.add(v)); });
  out.delete(""); return out;
}
function acceptedSetEN(c){
  const set = new Set();
  c.en.split("/").map(x=>x.trim()).filter(Boolean).forEach(alt=>{
    coreForms(alt.replace(/[()]/g,"")).forEach(v=>set.add(v));
    coreForms(alt.replace(/\([^)]*\)/g," ")).forEach(v=>set.add(v));
  });
  return set;
}
// German side matching
function deVariants(s){
  let x = s.replace(/\([^)]*\)/g," ").toLowerCase().replace(/[.,!?;:"'’`…]/g,"").replace(/[-–—]/g," ").replace(/\s+/g," ").trim();
  const forms = new Set([x, x.replace(/^(der|die|das|den|dem|des|ein|eine|einen|einem|einer|eines|zu|sich|im|in)\s+/,"")]);
  const out = new Set();
  forms.forEach(f=>{ if(!f) return; out.add(f); out.add(f.replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")); });
  out.delete(""); return out;
}
function coreFormsDE(str){
  const out = new Set();
  str.split("/").map(x=>x.trim()).filter(Boolean).forEach(alt=> deVariants(alt).forEach(v=>out.add(v)));
  return out;
}
function isCorrect(card, input){
  if(!input || !input.trim()) return false;
  if(direction==="en2de"){
    const cand = coreFormsDE(input); const set = coreFormsDE(card.de);
    for(const x of cand){ if(set.has(x)) return true; } return false;
  }
  const cand = coreForms(input); const set = acceptedSetEN(card);
  for(const x of cand){ if(set.has(x)) return true; } return false;
}
// quiz uses explicit direction param
function isCorrectDir(card, input, dir){ const save=direction; direction=dir; const r=isCorrect(card,input); direction=save; return r; }

function registerActivity(){
  const t=todayStr(), y=dayOffset(-1);
  if(stats.lastActiveDay!==t){
    stats.daysStreak = (stats.lastActiveDay===y) ? (stats.daysStreak||0)+1 : 1;
    stats.lastActiveDay=t;
  }
  if(stats.day!==t){ stats.day=t; stats.dayCount=0; }
  stats.dayCount++; stats.days[t]=(stats.days[t]||0)+1;
}

function activeIndices(){
  const A = allCards();
  return A.map((c,i)=>i).filter(i=>{
    const c=A[i];
    if(filter==="difficult") return ensureBox(keyOf(i)).wrong>=2;
    return (levelFilter==="all"||c.lvl===levelFilter) && (filter==="all"||c.cat===filter);
  });
}
function masteredCount(){ return activeIndices().filter(i=>ensureBox(keyOf(i)).b>=3).length; }
function masteredTotalAll(){ let n=0; allCards().forEach((_,i)=>{ if(ensureBox(keyOf(i)).b>=3) n++; }); return n; }
function difficultCount(){ let n=0; allCards().forEach((_,i)=>{ if(ensureBox(keyOf(i)).wrong>=2) n++; }); return n; }
function buildQueue(){
  const idx=activeIndices();
  idx.sort((a,b)=> (ensureBox(keyOf(a)).b-ensureBox(keyOf(b)).b) || (Math.random()-0.5));
  queue=idx; pos=0; flipped=false; checked=false; lastTyped="";
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ============================================================ BADGES */
const BADGES = [
  {i:"🌱",name:"Erste 10",cond:s=>masteredTotalAll()>=10},
  {i:"📚",name:"50 Wörter",cond:s=>masteredTotalAll()>=50},
  {i:"🏆",name:"100 Wörter",cond:s=>masteredTotalAll()>=100},
  {i:"🎯",name:"Treffsicher",cond:s=>s.reviewed>=50 && s.correct/Math.max(1,s.reviewed)>=0.9},
  {i:"🔥",name:"3-Tage-Serie",cond:s=>(s.daysStreak||0)>=3},
  {i:"⚡",name:"7-Tage-Serie",cond:s=>(s.daysStreak||0)>=7},
  {i:"✅",name:"Tagesziel",cond:s=>s.dayCount>=(s.goal||20)},
  {i:"💯",name:"100 Antworten",cond:s=>s.reviewed>=100},
];

/* ============================================================ RENDER: dashboard */
function renderKPIs(){
  const total=activeIndices().length, mastered=masteredCount();
  const acc=stats.reviewed?Math.round(stats.correct/stats.reviewed*100):0;
  const goal=stats.goal||20;
  const tiles=[
    {v:`${mastered}/${total}`,l:"Gemeistert",sub:"aktuelle Auswahl",c:"var(--teal)"},
    {v:`${acc}%`,l:"Genauigkeit",sub:`${stats.reviewed} Antworten`,c:"var(--amber)"},
    {v:`${stats.streak}`,l:"Serie 🔥",sub:`Rekord: ${stats.best}`,c:"var(--rust)"},
    {v:`${stats.dayCount}/${goal}`,l:"Heute",sub: stats.dayCount>=goal?"Ziel erreicht ✅":"Tagesziel",c:"var(--violet)"},
  ];
  document.getElementById("kpis").innerHTML = tiles.map(t=>`<div class="kpi" style="--accent:${t.c}"><div class="k-val">${t.v}</div><div class="k-lbl">${t.l}</div><div class="k-sub">${t.sub}</div></div>`).join("");
  document.getElementById("daysStreak").textContent = stats.daysStreak||0;
}
function renderWeek(){
  const days=[]; let max=1, sum=0;
  for(let k=6;k>=0;k--){ const d=dayOffset(-k); const c=stats.days[d]||0; days.push({d,c}); if(c>max)max=c; sum+=c; }
  const names=["So","Mo","Di","Mi","Do","Fr","Sa"];
  document.getElementById("week").innerHTML = days.map(x=>{
    const h=Math.max(3, Math.round(x.c/max*46));
    const today=x.d===todayStr()?" today":"";
    const dl=names[new Date(x.d).getDay()];
    return `<div class="day"><div class="col${today}" style="height:${h}px" title="${x.c} Karten"></div><div class="dl">${dl}</div></div>`;
  }).join("");
  document.getElementById("weekTotal").textContent = sum+" Karten";
}
function renderBadges(){
  const earned=BADGES.filter(b=>{try{return b.cond(stats)}catch(e){return false}});
  document.getElementById("badgeCount").textContent = earned.length+" / "+BADGES.length;
  document.getElementById("badges").innerHTML = BADGES.map(b=>{
    const on = earned.includes(b);
    return `<div class="badge${on?"":" locked"}"><span class="b-i">${b.i}</span>${b.name}</div>`;
  }).join("");
}
function renderUsers(){
  const el=document.getElementById("users"); el.innerHTML="";
  profiles.names.forEach((name,u)=>{
    const b=document.createElement("button");
    b.className="user"+(profiles.active===u?" on":""); b.textContent=name;
    b.title="Klick = wechseln · Doppelklick = umbenennen";
    b.onclick=()=>switchUser(u); b.ondblclick=(e)=>{e.stopPropagation();startRename(u,b);};
    el.appendChild(b);
  });
  const edit=document.createElement("button"); edit.className="user-edit"; edit.textContent="✎ umbenennen";
  edit.onclick=()=>{ const b=el.querySelector(".user.on"); if(b) startRename(profiles.active,b); };
  el.appendChild(edit);
}
function startRename(u,btn){
  const inp=document.createElement("input"); inp.className="user-input"; inp.value=profiles.names[u]; inp.maxLength=16;
  btn.replaceWith(inp); inp.focus(); inp.select(); let done=false;
  const commit=async()=>{ if(done)return; done=true; const v=inp.value.trim(); if(v)profiles.names[u]=v; await saveProfiles(); renderUsers(); };
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();commit();} else if(e.key==="Escape"){done=true;renderUsers();} });
  inp.addEventListener("blur",commit);
}
function renderLevels(){
  const el=document.getElementById("levels"); el.innerHTML="";
  LEVELS.forEach(l=>{
    const b=document.createElement("button"); b.className=(levelFilter===l?"on":""); b.textContent=LEVEL_LABELS[l];
    b.onclick=()=>{ levelFilter=l; if(filter!=="all"&&filter!=="difficult"){ const av=new Set(allCards().filter(c=>l==="all"||c.lvl===l).map(c=>c.cat)); if(!av.has(filter)) filter="all"; } buildQueue(); render(); };
    el.appendChild(b);
  });
}
function renderCats(){
  const el=document.getElementById("cats"); el.innerHTML="";
  const avail=new Set(allCards().filter(c=> levelFilter==="all"||c.lvl===levelFilter).map(c=>c.cat));
  Object.keys(CAT_LABELS).forEach(k=>{
    if(k==="custom" && !customCards.length) return;
    if(k!=="all" && k!=="custom" && !avail.has(k)) return;
    const b=document.createElement("button"); b.className="chip"+(filter===k?" on":""); b.textContent=CAT_LABELS[k];
    b.onclick=()=>{ filter=k; buildQueue(); render(); }; el.appendChild(b);
  });
  const dc=difficultCount();
  if(dc>0){
    const b=document.createElement("button"); b.className="chip hard"+(filter==="difficult"?" on":""); b.textContent="⚠︎ Schwierige ("+dc+")";
    b.onclick=()=>{ filter="difficult"; buildQueue(); render(); }; el.appendChild(b);
  }
}
function renderDir(){
  document.querySelectorAll("#dir button").forEach(b=>{
    b.classList.toggle("on", b.dataset.dir===direction);
    b.onclick=()=>{ if(direction===b.dataset.dir)return; direction=b.dataset.dir; checked=false; flipped=false; lastTyped=""; render(); };
  });
}
function renderModes(){
  document.querySelectorAll("#modes button").forEach(b=>{
    b.classList.toggle("on", b.dataset.mode===mode);
    b.onclick=()=>{ if(mode===b.dataset.mode)return; mode=b.dataset.mode; checked=false; flipped=false; lastTyped=""; render(); };
  });
}
function renderProgress(){
  const active=activeIndices().length; const pct=active?Math.round(masteredCount()/active*100):0;
  document.getElementById("progressFill").style.width=pct+"%";
}

/* ============================================================ RENDER: main (study) */
function promptSide(c){ return direction==="en2de" ? c.en : c.de; }
function answerSide(c){ return direction==="en2de" ? c.de : c.en; }

function sayBlock(text, big){
  return `<span class="say"><button class="say-btn" data-say="${text.replace(/"/g,'&quot;')}">🔊 Anhören</button>
    <span class="respell" title="vereinfachte Aussprache – das Audio ist maßgeblich">🗣 <b>${respell(text)}</b> <span style="opacity:.6">· vereinfacht</span></span></span>`;
}

function render(){
  loadVoices();
  renderKPIs(); renderWeek(); renderBadges(); renderUsers(); renderLevels(); renderCats(); renderDir(); renderModes(); renderProgress();
  const main=document.getElementById("main");
  if(quiz){ renderQuiz(); return; }

  const total=activeIndices().length;
  if(total===0){
    main.innerHTML=`<div class="done"><h2>Keine Karten hier</h2><p>Für diese Auswahl gibt es keine Vokabeln. Wähle ein anderes Thema, Niveau oder „Alle“.</p></div>`;
    return;
  }
  if(pos>=queue.length){
    const m=masteredCount();
    main.innerHTML=`<div class="done"><h2>Runde geschafft ✦</h2>
      <p>${m} von ${total} Karten sitzen sicher. ${m<total?"Noch eine Runde für den Rest?":"Alles gemeistert — stark!"}</p>
      <button class="btn reveal" id="restart">Nächste Runde <span style="opacity:.6">· Leertaste</span></button></div>`;
    document.getElementById("restart").onclick=()=>{ buildQueue(); render(); };
    return;
  }

  const c=allCards()[queue[pos]];
  const engProm = direction==="en2de";   // English is the prompt
  const banner=(mode==="type"&&checked)
    ? (lastCorrect?`<div class="banner ok">✓ Richtig!</div>`
        :`<div class="banner no">✗ Nicht ganz.${lastTyped?` <span class="typed">Du: „${lastTyped}“</span>`:` <span class="typed">(keine Eingabe)</span>`}</div>`):"";
  const dirBadge = `<span class="dir-badge">${direction==="en2de"?"EN → DE":"DE → EN"}</span>`;
  const tagrow=`<div class="tagrow"><span class="lvl-badge">${c.lvl}</span><span class="tag">${CAT_LABELS[c.cat]||c.cat}</span>${dirBadge}</div>`;

  const frontExtra = engProm ? `<div style="margin:2px 0 6px">${sayBlock(c.en)}</div>` : "";
  const front=(mode==="type"&&!checked)
    ? `<div class="face front">${tagrow}<div class="prompt">${promptSide(c)}</div>${frontExtra}
        <div class="type-wrap">
          <input id="answerInput" class="answer-input" placeholder="${direction==="en2de"?"Deutsche":"Englische"} Antwort eintippen…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
          <div class="type-hint"><kbd style="font-family:inherit;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;font-weight:600">Enter</kbd> zum Prüfen · leer = „Weiß ich nicht“</div>
        </div></div>`
    : `<div class="face front">${tagrow}<div class="prompt">${promptSide(c)}</div>${frontExtra}
        <div class="hint"><kbd>Leertaste</kbd> Antwort zeigen · <kbd>P</kbd> anhören</div></div>`;

  const engAns = !engProm;  // English is the answer side
  main.innerHTML=`
    <div class="stage"><div class="card ${flipped?"flipped":""}" id="card">
      ${front}
      <div class="face back">
        ${banner}
        <div class="tagrow"><span class="tag">${direction==="en2de"?"Deutsch":"Englisch"}</span></div>
        <div class="answer">${answerSide(c)} ${engAns?`<button class="say-btn" data-say="${c.en.replace(/"/g,'&quot;')}">🔊</button>`:""}</div>
        ${engAns?pronLine(c.en):""}
        <div class="example">${c.ex||""}</div>
        ${c.note?`<div class="note">${c.note}</div>`:`<div class="note" style="opacity:.55">Beispiel oben zeigt die typische Verwendung.</div>`}
      </div>
    </div></div>
    <div class="actions" id="actions"></div>
    <div class="footline">
      <span class="count">Karte ${pos+1} / ${queue.length}</span>
      <span class="kb"><kbd>Leertaste</kbd> weiter · <kbd>1</kbd> nochmal · <kbd>2</kbd> kann ich · <kbd>P</kbd> Ton</span>
      <button class="reset" id="reset">zurücksetzen</button>
    </div>`;

  document.getElementById("card").onclick=()=>{ if(mode==="type"&&!checked)return; if(!flipped) doFlip(); };
  document.getElementById("reset").onclick=resetAll;
  const inp=document.getElementById("answerInput");
  if(inp){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();submitAnswer();} }); }
  bindSay();
  renderActions();
}
function bindSay(){ document.querySelectorAll(".say-btn").forEach(b=>{ b.onclick=(e)=>{ e.stopPropagation(); speak(b.dataset.say); }; }); }

function submitAnswer(){
  const c=allCards()[queue[pos]]; const inp=document.getElementById("answerInput");
  lastTyped=inp?inp.value.trim():""; lastCorrect=isCorrect(c,lastTyped); checked=true; flipped=true; render();
}
function renderActions(){
  const a=document.getElementById("actions"); if(!a)return;
  if(!flipped){
    if(mode==="type"&&!checked){ a.innerHTML=`<button class="btn reveal" id="revealBtn">Prüfen</button>`; document.getElementById("revealBtn").onclick=submitAnswer; }
    else{ a.innerHTML=`<button class="btn reveal" id="revealBtn">Antwort zeigen</button>`; document.getElementById("revealBtn").onclick=doFlip; }
  }else{
    const ad=(mode==="type"&&checked&&lastCorrect)?" dim":""; const kd=(mode==="type"&&checked&&!lastCorrect)?" dim":"";
    a.innerHTML=`<button class="btn again${ad}" id="againBtn">Nochmal</button><button class="btn know${kd}" id="knowBtn">Kann ich</button>`;
    document.getElementById("againBtn").onclick=()=>rate(false); document.getElementById("knowBtn").onclick=()=>rate(true);
  }
}
function doFlip(){ flipped=!flipped; const card=document.getElementById("card"); if(card)card.classList.toggle("flipped",flipped); renderActions(); }
async function rate(known){
  const i=queue[pos], k=keyOf(i), box=ensureBox(k); box.seen++;
  if(known){ box.b=Math.min(3,box.b+1); stats.correct++; stats.streak++; if(stats.streak>stats.best)stats.best=stats.streak; }
  else{ box.b=1; box.wrong++; stats.streak=0; queue.push(i); }
  stats.reviewed++; registerActivity();
  await saveBoxes(); await saveStats();
  pos++; flipped=false; checked=false; lastTyped=""; render();
}
async function resetAll(){ activeIndices().forEach(i=>{ boxes[keyOf(i)]={b:1,wrong:0,seen:0}; }); await saveBoxes(); buildQueue(); render(); }

/* ============================================================ QUIZ */
function startQuiz(){
  const pool=activeIndices(); if(!pool.length) return;
  const size=Math.min(12,pool.length);
  quiz={ items:shuffle(pool).slice(0,size), i:0, wrong:[], checked:false, correct:0, typed:"", dir:direction };
  render();
}
function renderQuiz(){
  const main=document.getElementById("main");
  if(quiz.i>=quiz.items.length){
    const n=quiz.items.length, sc=Math.round(quiz.correct/n*100);
    const missHTML = quiz.wrong.length ? `<div class="miss-list">${quiz.wrong.map(w=>`<div class="m"><span>${w.prompt}</span><span class="en">${w.answer}</span></div>`).join("")}</div>` : `<p>Perfekt — alles richtig! 🎉</p>`;
    main.innerHTML=`<div class="done">
      <div class="k-lbl" style="color:var(--ink-soft);letter-spacing:.1em">Prüfungsergebnis</div>
      <div class="score-ring" style="color:${sc>=80?'var(--teal-deep)':sc>=50?'var(--amber)':'var(--rust)'}">${sc}%</div>
      <p>${quiz.correct} von ${n} richtig.</p>
      ${missHTML}
      <div class="btnrow">
        ${quiz.wrong.length?`<button class="btn again" id="qRetry">Fehler üben (${quiz.wrong.length})</button>`:""}
        <button class="btn reveal" id="qNew">Neue Prüfung</button>
        <button class="btn ghost" id="qEnd">Beenden</button>
      </div></div>`;
    document.getElementById("qNew").onclick=()=>startQuiz();
    document.getElementById("qEnd").onclick=()=>{ quiz=null; buildQueue(); render(); };
    const rt=document.getElementById("qRetry");
    if(rt) rt.onclick=()=>{ quiz={items:quiz.wrong.map(w=>w.idx), i:0, wrong:[], checked:false, correct:0, typed:"", dir:quiz.dir}; render(); };
    return;
  }
  const c=allCards()[quiz.items[quiz.i]];
  const engProm = quiz.dir==="en2de";
  const prompt = engProm ? c.en : c.de;
  const answer = engProm ? c.de : c.en;
  const banner = quiz.checked ? (quiz.lastOK?`<div class="banner ok">✓ Richtig!</div>`:`<div class="banner no">✗ Richtig: <b style="margin-left:4px">${answer}</b>${quiz.typed?` <span class="typed">· du: „${quiz.typed}“</span>`:""}</div>`) : "";
  const engVisible = engProm || quiz.checked;
  const say = engVisible ? `<div style="margin:6px 0">${sayBlock(c.en)}${pronLine(c.en)}</div>` : "";
  main.innerHTML=`
    <div class="stage"><div class="card" id="card"><div class="face front">
      <div class="tagrow"><span class="lvl-badge">${c.lvl}</span><span class="tag">🎯 Prüfung</span><span class="dir-badge">${engProm?"EN → DE":"DE → EN"}</span></div>
      ${banner}
      <div class="prompt">${prompt}</div>
      ${say}
      <div class="type-wrap">
        <input id="quizInput" class="answer-input" placeholder="${engProm?"Deutsche":"Englische"} Antwort…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" ${quiz.checked?"disabled":""}>
        <div class="type-hint">${quiz.checked?"<kbd style='font-family:inherit;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;font-weight:600'>Leertaste</kbd> weiter":"<kbd style='font-family:inherit;background:#fff;box-shadow:inset 0 0 0 1px var(--paper-edge);border-radius:6px;padding:3px 8px;font-weight:600'>Enter</kbd> prüfen"}</div>
      </div></div></div></div>
    <div class="actions">${quiz.checked?`<button class="btn reveal" id="qNext">Weiter</button>`:`<button class="btn reveal" id="qCheck">Prüfen</button>`}</div>
    <div class="footline"><span class="count">Frage ${quiz.i+1} / ${quiz.items.length}</span><span class="kb">richtig: ${quiz.correct}</span><button class="reset" id="qAbort">abbrechen</button></div>`;
  const inp=document.getElementById("quizInput");
  if(inp && !quiz.checked){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();quizCheck();} }); }
  const cb=document.getElementById("qCheck"); if(cb) cb.onclick=quizCheck;
  const nb=document.getElementById("qNext"); if(nb) nb.onclick=quizNext;
  document.getElementById("qAbort").onclick=()=>{ quiz=null; buildQueue(); render(); };
  bindSay();
}
async function quizCheck(){
  const idx=quiz.items[quiz.i]; const c=allCards()[idx]; const inp=document.getElementById("quizInput");
  quiz.typed=inp?inp.value.trim():""; quiz.lastOK=isCorrectDir(c,quiz.typed,quiz.dir); quiz.checked=true;
  const box=ensureBox(keyOf(idx)); box.seen++;
  if(quiz.lastOK){ quiz.correct++; box.b=Math.min(3,box.b+1); stats.correct++; stats.streak++; if(stats.streak>stats.best)stats.best=stats.streak; }
  else{ box.b=1; box.wrong++; stats.streak=0; quiz.wrong.push({idx, prompt:(quiz.dir==="en2de"?c.en:c.de), answer:(quiz.dir==="en2de"?c.de:c.en)}); }
  stats.reviewed++; registerActivity();
  await saveBoxes(); await saveStats();
  render();
}
function quizNext(){ quiz.i++; quiz.checked=false; quiz.typed=""; render(); }

/* ============================================================ ADD OWN CARD */
function openAddCard(){
  const cats=Object.keys(CAT_LABELS).filter(k=>k!=="all"&&k!=="difficult");
  const lvls=["A1","A2","B1","B2","C1","C2"];
  document.getElementById("modalRoot").innerHTML=`
    <div class="modal-bg" id="modalBg"><div class="modal">
      <h3>Eigene Karte hinzufügen</h3>
      <div class="field"><label>Deutsch</label><input id="fDe" placeholder="z.B. die Besprechung"></div>
      <div class="field"><label>Englisch</label><input id="fEn" placeholder="z.B. the meeting  (Alternativen mit / trennen)"></div>
      <div class="field"><label>Beispielsatz (optional, Englisch)</label><input id="fEx" placeholder="We have a meeting at 3."></div>
      <div class="row2">
        <div class="field"><label>Niveau</label><select id="fLvl">${lvls.map(l=>`<option ${l===levelFilter?"selected":""}>${l}</option>`).join("")}</select></div>
        <div class="field"><label>Thema</label><select id="fCat">${cats.map(k=>`<option value="${k}" ${k==="custom"?"selected":""}>${CAT_LABELS[k]}</option>`).join("")}</select></div>
      </div>
      <div class="m-actions"><button class="btn ghost" id="mCancel">Abbrechen</button><button class="btn reveal" id="mSave">Speichern</button></div>
    </div></div>`;
  document.getElementById("modalBg").onclick=(e)=>{ if(e.target.id==="modalBg") closeModal(); };
  document.getElementById("mCancel").onclick=closeModal;
  document.getElementById("mSave").onclick=saveNewCard;
  document.getElementById("fDe").focus();
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }
async function saveNewCard(){
  const de=document.getElementById("fDe").value.trim();
  const en=document.getElementById("fEn").value.trim();
  const ex=document.getElementById("fEx").value.trim();
  const lvl=document.getElementById("fLvl").value;
  const cat=document.getElementById("fCat").value;
  if(!de||!en){ alert("Bitte Deutsch und Englisch ausfüllen."); return; }
  customCards.push({lvl,cat,de,en,ex: ex||"",note:"",custom:true});
  await saveCustom(); closeModal();
  levelFilter=lvl; filter=cat; buildQueue(); render();
}

/* ============================================================ KEYBOARD (space = weiter) */
document.addEventListener("keydown", e=>{
  const tag=e.target&&e.target.tagName;
  if(tag==="INPUT"||tag==="TEXTAREA") return;
  if(document.getElementById("modalBg")){ if(e.key==="Escape") closeModal(); return; }
  // quiz keys
  if(quiz){
    if(e.code==="Space"){ e.preventDefault(); if(quiz.i>=quiz.items.length){ return; } if(quiz.checked) quizNext(); }
    else if(e.key==="Enter" && quiz.checked) quizNext();
    else if((e.key==="p"||e.key==="P")){ const c=allCards()[quiz.items[quiz.i]]; if(c) speak(c.en); }
    return;
  }
  if(e.key==="p"||e.key==="P"){ const c=allCards()[queue[pos]]; if(c) speak(c.en); return; }
  if(e.code==="Space"){
    e.preventDefault();
    const restart=document.getElementById("restart"); if(restart){ restart.click(); return; }
    if(flipped) advance(); else if(mode!=="type") doFlip();
  }
  else if(e.key==="Enter"&&flipped) advance();
  else if(flipped&&e.key==="1") rate(false);
  else if(flipped&&e.key==="2") rate(true);
});
function advance(){ if(mode==="type"&&checked) rate(lastCorrect); else rate(true); }

document.getElementById("quizBtn").onclick=startQuiz;
document.getElementById("addBtn").onclick=openAddCard;

(async function init(){ await loadProfiles(); await loadProfileData(); buildQueue(); render(); })();
</script>
</body>
